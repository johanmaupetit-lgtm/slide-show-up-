  {

  <script type="module">
    import React, { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } from 'react';
    import { createRoot } from 'react-dom/client';
    window.React = React;
    window.ReactHooks = { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext };
    window.createRoot = createRoot;
    window.dispatchEvent(new Event('react-ready'));

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    (async function bootApp() {
      // ATTENTE DU CHARGEMENT REACT
      await new Promise(resolve => {
        if (window.React) return resolve();
        window.addEventListener('react-ready', resolve, { once: true });
      });

      const React = window.React;
      const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = window.ReactHooks;
      const createRoot = window.createRoot;

    // ============================================================
    // CONSTANTES — TAUX MARCHÉ + SOURCES
    // ============================================================

    const MARKET_RATES_DEFAULT = {
      leadTraite: 1.00,       // MIT Oldroyd 2011 — 100% en <5min
      leadRdv: 0.35,          // Edilead 2024 — 35% lead → RDV
      rdvHonore: 0.95,        // DETECTOUR — 95%
      devisSignature: 0.43,   // ELCIA 2025 + Yumens — 43%
      devisDormants: 0.04,    // Pharow 2024 — 4%
    };

    const SCENARIO_RATES = {
      pessimiste: { leadTraite: 1.0, leadRdv: null, rdvHonore: null, devisSignature: null, devisDormants: 0.02 },
      neutre:     { leadTraite: 1.0, leadRdv: 0.25, rdvHonore: 0.86, devisSignature: 0.33, devisDormants: 0.03 },
      optimiste:  { leadTraite: 1.0, leadRdv: 0.35, rdvHonore: 0.95, devisSignature: 0.43, devisDormants: 0.04 },
    };

    const SOURCES = {
      leadTraite: { name: 'MIT Oldroyd 2011', url: '[URL_MIT_OLDROYD]' },
      leadRdv: { name: 'Edilead 2024', url: '[URL_EDILEAD]' },
      rdvHonore: { name: 'DETECTOUR', url: '[URL_DETECTOUR]' },
      devisSignature: { name: 'ELCIA 2025 + Yumens', url: '[URL_ELCIA_2025]' },
      devisDormants: { name: 'Pharow 2024', url: '[URL_PHAROW_2024]' },
    };

    const DEFAULT_CAUSES = {
      leadTraite: "Pas de rappel automatique <5min, équipes saturées sur les chantiers",
      leadRdv: "Pas de script de qualification structuré, leads peu requalifiés",
      rdvHonore: "Pas de séquence anti no-show (mail J-2, SMS J-1, confirmation J-2h)",
      devisSignature: "Aucune relance structurée, devis envoyés trop tard, pas de scoring d'intérêt",
      devisDormants: "Aucune réactivation, base oubliée, devis perdus dans le CRM",
    };

    const STEP_LABELS = {
      leadTraite: 'Lead → traité',
      leadRdv: 'Lead → RDV pris',
      rdvHonore: 'RDV → honoré',
      devisSignature: 'Devis → signature',
      devisDormants: 'Devis dormants',
    };

    const GOOGLE_FONTS = [
      'Inter', 'Roboto', 'Open Sans', 'Lato', 'Montserrat', 'Poppins',
      'Raleway', 'Source Sans Pro', 'Oswald', 'Roboto Slab', 'Playfair Display',
      'Merriweather', 'PT Sans', 'Nunito', 'Mulish', 'Work Sans', 'Manrope',
      'Cinzel', 'Bebas Neue', 'Anton', 'Archivo', 'Barlow', 'DM Sans',
      'Fira Sans', 'Hind', 'Karla', 'Libre Baskerville', 'Libre Franklin',
      'Noto Sans', 'PT Serif', 'Quicksand', 'Rubik', 'Source Serif Pro',
      'Tinos', 'Ubuntu', 'Roboto Condensed', 'Crimson Text', 'Lora',
    ];

    const ADMIN_PASSWORD = 'scalia2026';
    const STORAGE_KEY = 'scalia-roi-app-state';
    const INVESTMENT = 16000;

    // ============================================================
    // UTILS
    // ============================================================

    const formatEUR = (n) => {
      if (n == null || isNaN(n)) return '—';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
    };
    const formatPct = (n) => {
      if (n == null || isNaN(n)) return '—';
      return Math.round(n * 100) + ' %';
    };
    const formatNumber = (n) => {
      if (n == null || isNaN(n)) return '—';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(Math.round(n));
    };
    const slugify = (s) => s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const dateSlug = (d) => {
      const date = new Date(d);
      const months = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
      return date.getDate() + months[date.getMonth()];
    };
    const lightenHex = (hex, amount = 0.85) => {
      // Mix hex with white to create a light version
      const h = hex.replace('#','');
      const r = parseInt(h.substring(0,2),16);
      const g = parseInt(h.substring(2,4),16);
      const b = parseInt(h.substring(4,6),16);
      const nr = Math.round(r + (255-r)*amount);
      const ng = Math.round(g + (255-g)*amount);
      const nb = Math.round(b + (255-b)*amount);
      return '#' + [nr,ng,nb].map(x => x.toString(16).padStart(2,'0')).join('');
    };

    // ============================================================
    // STORAGE
    // ============================================================

    const loadState = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { sessions: [] };
      } catch { return { sessions: [] }; }
    };
    const saveState = (state) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { console.error('Save failed', e); }
    };

    // ============================================================
    // CALCULATIONS
    // ============================================================

    const calcProspectRates = (inputs) => {
      const leadsRecus = +inputs.leadsRecus || 0;
      const leadsTraites = +inputs.leadsTraites || 0;
      const rdvPris = +inputs.rdvPris || 0;
      const rdvHonores = +inputs.rdvHonores || 0;
      const signatures = +inputs.signatures || 0;

      return {
        leadTraite: leadsRecus > 0 ? leadsTraites / leadsRecus : 0,
        leadRdv: leadsTraites > 0 ? rdvPris / leadsTraites : 0,
        rdvHonore: rdvPris > 0 ? rdvHonores / rdvPris : 0,
        devisSignature: rdvHonores > 0 ? signatures / rdvHonores : 0,
      };
    };

    const calcLosses = (inputs, marketRates) => {
      const p = calcProspectRates(inputs);
      const leadsRecus = +inputs.leadsRecus || 0;
      const ticket = +inputs.ticket || 0;
      const devisDormants = +inputs.devisDormants || 0;
      const m = marketRates;

      // Pertes par étape : calcul cascadé sur le funnel
      // Pour chaque étape, on calcule combien de signatures supplémentaires on ferait
      // si on avait le taux marché à cette étape (taux prospects ailleurs).

      const baseSignatures = leadsRecus * p.leadTraite * p.leadRdv * p.rdvHonore * p.devisSignature;

      const calcStepLoss = (stepKey) => {
        const rates = { ...p };
        // Override only this step with market
        rates[stepKey] = m[stepKey];
        // Ceiling : if prospect already at or above market, no loss
        if (p[stepKey] >= m[stepKey]) return { loss: 0, delta: 0, atMarket: true };
        const newSigs = leadsRecus * rates.leadTraite * rates.leadRdv * rates.rdvHonore * rates.devisSignature;
        const extraSigs = newSigs - baseSignatures;
        return { loss: extraSigs * ticket, delta: m[stepKey] - p[stepKey], atMarket: false };
      };

      const lossLeadTraite = calcStepLoss('leadTraite');
      const lossLeadRdv = calcStepLoss('leadRdv');
      const lossRdvHonore = calcStepLoss('rdvHonore');
      const lossDevisSignature = calcStepLoss('devisSignature');

      // Devis dormants — one-shot (taux de conversion réactivation = 0.33, médian ELCIA)
      const REACTIVATION_SIGNATURE_RATE = 0.33;
      const lossDormants = devisDormants * m.devisDormants * REACTIVATION_SIGNATURE_RATE * ticket;

      const monthly = lossLeadTraite.loss + lossLeadRdv.loss + lossRdvHonore.loss + lossDevisSignature.loss;
      const annual = monthly * 12;
      const caActuel = baseSignatures * ticket;
      const caPotentielMensuel = caActuel + monthly;

      return {
        prospectRates: p,
        baseSignatures,
        steps: {
          leadTraite: { ...lossLeadTraite, prospectRate: p.leadTraite, marketRate: m.leadTraite },
          leadRdv: { ...lossLeadRdv, prospectRate: p.leadRdv, marketRate: m.leadRdv },
          rdvHonore: { ...lossRdvHonore, prospectRate: p.rdvHonore, marketRate: m.rdvHonore },
          devisSignature: { ...lossDevisSignature, prospectRate: p.devisSignature, marketRate: m.devisSignature },
          devisDormants: { loss: lossDormants, prospectRate: 0, marketRate: m.devisDormants, atMarket: false },
        },
        monthly,
        annual,
        oneShot: lossDormants,
        caActuel,
        caPotentielMensuel,
      };
    };

    const calcGains = (inputs, scenarioKey, marketRates) => {
      const p = calcProspectRates(inputs);
      const sc = SCENARIO_RATES[scenarioKey];
      const leadsRecus = +inputs.leadsRecus || 0;
      const ticket = +inputs.ticket || 0;
      const devisDormants = +inputs.devisDormants || 0;

      // Apply scenario with ceiling rule
      const apply = (key) => {
        if (sc[key] == null) return p[key]; // pessimiste keeps prospect rates
        return Math.max(p[key] || 0, sc[key]);
      };

      const rates = {
        leadTraite: apply('leadTraite'),
        leadRdv: apply('leadRdv'),
        rdvHonore: apply('rdvHonore'),
        devisSignature: apply('devisSignature'),
      };

      const todaySigs = leadsRecus * p.leadTraite * p.leadRdv * p.rdvHonore * p.devisSignature;
      const systemSigs = leadsRecus * rates.leadTraite * rates.leadRdv * rates.rdvHonore * rates.devisSignature;
      const monthlyGain = (systemSigs - todaySigs) * ticket;
      const annualGain = monthlyGain * 12;
      const oneShot = devisDormants * sc.devisDormants * 0.33 * ticket;
      const total12mo = annualGain + oneShot;
      const roiMultiplier = Math.round(total12mo / INVESTMENT);
      const breakEvenMonth = oneShot >= INVESTMENT
        ? 1
        : (monthlyGain > 0 ? Math.ceil((INVESTMENT - oneShot) / monthlyGain) : null);

      const caActuel = todaySigs * ticket;
      const caPotentielMensuel = systemSigs * ticket;

      return { monthlyGain, annualGain, oneShot, total12mo, roiMultiplier, breakEvenMonth, caActuel, caPotentielMensuel };
    };

    // ============================================================
    // ROUTER (HASH-BASED)
    // ============================================================

    const useHashRoute = () => {
      const [route, setRoute] = useState(() => parseHash(window.location.hash));
      useEffect(() => {
        const onHashChange = () => setRoute(parseHash(window.location.hash));
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return route;
    };
    function parseHash(hash) {
      const clean = (hash || '#/').replace(/^#/, '');
      const parts = clean.split('/').filter(Boolean);
      if (parts.length === 0) return { name: 'home' };
      if (parts[0] === 'admin') return { name: 'admin' };
      if (parts[0] === 'session' && parts[1]) return { name: 'session', slug: parts[1] };
      return { name: 'home' };
    }
    const navigate = (path) => { window.location.hash = path; };

    // ============================================================
    // CONTEXT
    // ============================================================

    const AppContext = createContext(null);

    const AppProvider = ({ children }) => {
      const [state, setState] = useState(loadState);
      const [apiKey, setApiKey] = useState(() => {
        // Migration douce depuis l'ancien stockage Anthropic
        const newKey = localStorage.getItem('scalia-gemini-key');
        if (newKey) return newKey;
        const oldKey = localStorage.getItem('scalia-anthropic-key');
        if (oldKey) { localStorage.removeItem('scalia-anthropic-key'); }
        return '';
      });
      const saveTimer = useRef(null);
      useEffect(() => {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => saveState(state), 400);
      }, [state]);
      useEffect(() => {
        if (apiKey) localStorage.setItem('scalia-gemini-key', apiKey);
        else localStorage.removeItem('scalia-gemini-key');
      }, [apiKey]);

      const createSession = (data) => {
        const baseSlug = slugify(data.companyName);
        const ds = dateSlug(data.meetingDate);
        const slug = `${baseSlug}-${ds}`;
        const session = {
          slug,
          dirigeantName: data.dirigeantName,
          companyName: data.companyName,
          clientWebsite: data.clientWebsite || '',
          clientLogoUrl: data.clientLogoUrl || '',
          // Design tokens charte
          clientPrimaryColor: data.clientPrimaryColor || '#1E5F8E',
          clientSecondaryColor: data.clientSecondaryColor || '#888888',
          clientAccentColor: data.clientAccentColor || '',
          clientBgColor: data.clientBgColor || '#FAFAFA',
          clientBgAltColor: data.clientBgAltColor || '#FFFFFF',
          clientTextColor: data.clientTextColor || '#1A1A1A',
          clientMutedTextColor: data.clientMutedTextColor || '#666666',
          clientPrimaryFont: data.clientPrimaryFont || 'Inter',
          clientSecondaryFont: data.clientSecondaryFont || '',
          clientBorderRadius: data.clientBorderRadius || '4px',
          clientCardStyle: data.clientCardStyle || 'flat',
          clientButtonStyle: data.clientButtonStyle || 'filled',
          clientSpacing: data.clientSpacing || 'balanced',
          clientTitleCase: data.clientTitleCase || 'none',
          clientTitleWeight: data.clientTitleWeight || '700',
          clientTitleLetterSpacing: data.clientTitleLetterSpacing || 'normal',
          clientStyleGeneral: data.clientStyleGeneral || '',
          clientAmbiance: data.clientAmbiance || '',
          meetingDate: data.meetingDate,
          inputs: { leadsRecus: '', leadsTraites: '', rdvPris: '', rdvHonores: '', signatures: '', ticket: '', devisDormants: '' },
          marketRatesOverrides: {},
          causes: { ...DEFAULT_CAUSES },
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        setState(s => ({ ...s, sessions: [...s.sessions, session] }));
        return slug;
      };
      const updateSession = (slug, patch) => {
        setState(s => ({
          ...s,
          sessions: s.sessions.map(ss => ss.slug === slug
            ? { ...ss, ...patch, updatedAt: new Date().toISOString() }
            : ss),
        }));
      };
      const deleteSession = (slug) => {
        if (!confirm('Supprimer cette session définitivement ?')) return;
        setState(s => ({ ...s, sessions: s.sessions.filter(ss => ss.slug !== slug) }));
      };
      const getSession = (slug) => state.sessions.find(s => s.slug === slug);
      const exportAll = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `scalia-roi-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };
      const importAll = (jsonText) => {
        try {
          const data = JSON.parse(jsonText);
          if (!data.sessions || !Array.isArray(data.sessions)) throw new Error();
          if (!confirm(`Importer ${data.sessions.length} session(s) ? Cela écrasera vos données actuelles.`)) return;
          setState(data);
          return true;
        } catch { alert('Fichier JSON invalide.'); return false; }
      };

      return (
        <AppContext.Provider value={{ state, apiKey, setApiKey, createSession, updateSession, deleteSession, getSession, exportAll, importAll }}>
          {children}
        </AppContext.Provider>
      );
    };
    const useApp = () => useContext(AppContext);

    // ============================================================
    // COMPONENTS — ADMIN
    // ============================================================

    const PasswordGate = ({ onUnlock }) => {
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState(false);
      const submit = (e) => {
        e.preventDefault();
        if (pwd === ADMIN_PASSWORD) onUnlock();
        else { setErr(true); setPwd(''); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center bg-noir text-white">
          <form onSubmit={submit} className="w-full max-w-sm p-8 border border-or/30 rounded">
            <div className="logo-scalia mx-auto mb-8" style={{fontSize:'40px'}}>
              <span className="scalia">SCALIA</span>
              <span className="rule"></span>
              <span className="btp">BTP</span>
            </div>
            <p className="font-serif uppercase tracking-[0.18em] text-or text-sm text-center mb-6">Calculateur ROI · Admin</p>
            <input
              type="password"
              value={pwd}
              onChange={e => { setPwd(e.target.value); setErr(false); }}
              placeholder="Mot de passe"
              className={`w-full bg-noir-card border ${err ? 'border-rouge' : 'border-anthracite'} rounded px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-or transition`}
              autoFocus
            />
            <button type="submit" className="mt-4 w-full bg-or text-noir font-semibold py-3 rounded uppercase tracking-wider text-sm hover:bg-or-fonce transition">
              Accéder
            </button>
            {err && <p className="text-rouge text-sm mt-3 text-center">Mot de passe incorrect</p>}
          </form>
        </div>
      );
    };

    const AdminPage = () => {
      // L'accès est déjà gated par le script auth en <head>
      return <AdminDashboard />;
    };

    const AdminDashboard = () => {
      const { state, apiKey, setApiKey, createSession, deleteSession, exportAll, importAll } = useApp();
      const [showForm, setShowForm] = useState(false);
      const [showApiSettings, setShowApiSettings] = useState(false);
      const [keyDraft, setKeyDraft] = useState(apiKey);

      return (
        <div className="min-h-screen bg-noir text-white">
          <div className="max-w-5xl mx-auto px-8 py-12">
            <div className="flex items-center justify-between mb-12">
              <div className="logo-scalia" style={{fontSize:'48px'}}>
                <span className="scalia">SCALIA</span>
                <span className="rule"></span>
                <span className="btp">BTP</span>
              </div>
              <div className="text-right">
                <p className="font-serif uppercase tracking-[0.25em] text-or text-xs">Calculateur ROI</p>
                <p className="text-gray-400 text-sm mt-1">Console admin</p>
              </div>
            </div>

            <div className="flex justify-between items-center mb-6">
              <h2 className="font-serif uppercase tracking-[0.18em] text-white text-lg">Sessions</h2>
              <button onClick={() => setShowForm(s => !s)} className="bg-or text-noir px-5 py-2.5 rounded font-semibold uppercase text-xs tracking-wider hover:bg-or-fonce transition">
                {showForm ? 'Annuler' : '+ Nouvelle session'}
              </button>
            </div>

            {showForm && <SessionForm onCreate={(data) => { const slug = createSession(data); setShowForm(false); navigate(`/session/${slug}`); }} onCancel={() => setShowForm(false)} />}

            <SessionList sessions={state.sessions} onDelete={deleteSession} />

            <div className="mt-16 pt-8 border-t border-anthracite">
              <h3 className="font-serif uppercase tracking-[0.18em] text-or text-sm mb-4">Clé API Google Gemini (analyse IA gratuite)</h3>
              <p className="text-gray-400 text-sm mb-3">
                {apiKey
                  ? <>✓ Clé configurée ({apiKey.slice(0,10)}…{apiKey.slice(-4)}). L'analyse IA est disponible quand tu uploades des captures.</>
                  : <>Non configurée. L'extraction se fait uniquement par couleurs dominantes (Phase A). Configure une clé <strong>Google Gemini</strong> pour activer l'analyse IA complète (couleurs + polices + style + ambiance) — <strong>100% gratuit, aucune carte bancaire</strong>.</>
                }
              </p>
              {showApiSettings ? (
                <div className="bg-noir-card border border-anthracite rounded p-4 space-y-3">
                  <input
                    type="password"
                    value={keyDraft}
                    onChange={e => setKeyDraft(e.target.value)}
                    placeholder="AIzaSy…"
                    className="form-input font-mono text-sm"
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button onClick={() => { setApiKey(keyDraft.trim()); setShowApiSettings(false); }} className="bg-or text-noir px-4 py-1.5 rounded text-xs font-semibold uppercase tracking-wider hover:bg-or-fonce transition">Enregistrer</button>
                    <button onClick={() => { setShowApiSettings(false); setKeyDraft(apiKey); }} className="text-gray-400 px-3 py-1.5 text-xs hover:text-white">Annuler</button>
                    {apiKey && <button onClick={() => { setApiKey(''); setKeyDraft(''); setShowApiSettings(false); }} className="text-rouge px-3 py-1.5 text-xs hover:text-white ml-auto">Effacer la clé</button>}
                  </div>
                  <div className="text-xs text-gray-400 leading-relaxed space-y-1">
                    <p><strong className="text-or">Setup gratuit, 2 minutes :</strong></p>
                    <p>1. Va sur <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-or underline">aistudio.google.com/app/apikey</a></p>
                    <p>2. Connecte-toi avec un compte Google</p>
                    <p>3. Clique <strong>"Create API key"</strong> → copie la clé</p>
                    <p>4. Colle-la ici → Enregistrer</p>
                    <p className="mt-2 text-gray-500">Quota gratuit Gemini 2.0 Flash : 1 500 analyses/jour. Stockée uniquement dans ce navigateur.</p>
                  </div>
                </div>
              ) : (
                <button onClick={() => setShowApiSettings(true)} className="bg-noir-card border border-or/40 text-or px-4 py-2 rounded text-sm hover:border-or transition">
                  {apiKey ? 'Modifier la clé' : '+ Configurer la clé API Gemini (gratuit)'}
                </button>
              )}
            </div>

            <div className="mt-12 pt-8 border-t border-anthracite">
              <h3 className="font-serif uppercase tracking-[0.18em] text-or text-sm mb-4">Sauvegarde</h3>
              <p className="text-gray-400 text-sm mb-4">
                Les sessions sont stockées dans ce navigateur (localStorage). Exportez régulièrement le JSON pour ne rien perdre lors d'un changement de PC.
              </p>
              <div className="flex gap-3">
                <button onClick={exportAll} className="bg-noir-card border border-or/40 text-or px-4 py-2 rounded text-sm hover:border-or transition">
                  ↓ Exporter toutes les sessions (JSON)
                </button>
                <label className="bg-noir-card border border-anthracite text-gray-300 px-4 py-2 rounded text-sm hover:border-or/40 cursor-pointer transition">
                  ↑ Importer un JSON
                  <input type="file" accept="application/json" className="hidden" onChange={e => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => importAll(ev.target.result);
                    reader.readAsText(file);
                    e.target.value = '';
                  }} />
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const SessionForm = ({ onCreate, onCancel }) => {
      const { apiKey } = useApp();
      const [data, setData] = useState({
        dirigeantName: '',
        companyName: '',
        clientWebsite: '',
        meetingDate: new Date().toISOString().slice(0, 10),
        clientPrimaryColor: '#1E5F8E',
        clientSecondaryColor: '#888888',
        clientAccentColor: '',
        clientBgColor: '#FAFAFA',
        clientBgAltColor: '#FFFFFF',
        clientTextColor: '#1A1A1A',
        clientMutedTextColor: '#666666',
        clientPrimaryFont: 'Inter',
        clientSecondaryFont: '',
        clientBorderRadius: '4px',
        clientCardStyle: 'flat',
        clientButtonStyle: 'filled',
        clientSpacing: 'balanced',
        clientTitleCase: 'none',
        clientTitleWeight: '700',
        clientTitleLetterSpacing: 'normal',
        clientStyleGeneral: '',
        clientAmbiance: '',
        clientLogoUrl: '',
      });
      const [analysisText, setAnalysisText] = useState('');
      const [notice, setNotice] = useState('');
      const [screenshots, setScreenshots] = useState([]); // dataUrls
      const [palette, setPalette] = useState([]); // hex colors
      const [extracting, setExtracting] = useState(false);
      const [aiAnalyzing, setAiAnalyzing] = useState(false);
      const [aiResult, setAiResult] = useState(null);
      const [urlFetching, setUrlFetching] = useState(false);
      const dropZoneRef = useRef(null);

      const fetchFromUrl = async () => {
        const url = data.clientWebsite.trim();
        if (!url) { alert('Saisis une URL d\'abord.'); return; }
        setUrlFetching(true);
        setNotice('');
        try {
          const screenshotDataUrl = await fetchUrlScreenshot(url);
          // Ajouter le screenshot aux screenshots existants
          const newShots = [...screenshots, screenshotDataUrl];
          setScreenshots(newShots);
          // Lancer extraction couleurs locale
          const blob = await (await fetch(screenshotDataUrl)).blob();
          const colors = await extractFromMultiple([blob], 6);
          if (colors.length > 0) setPalette(colors);
          setNotice(`✓ Screenshot du site récupéré. ${apiKey ? 'Clique "Analyser avec IA" pour la charte complète.' : 'Configure une clé Gemini pour l\'analyse complète.'}`);
          // Si clé API → lancer auto
          if (apiKey) {
            await runAIAnalysisOn(newShots);
          }
        } catch (e) {
          alert('Erreur récupération URL : ' + e.message + '\n\nAstuce : si Microlink bloque le site, fais un screenshot manuel.');
        } finally {
          setUrlFetching(false);
        }
      };

      const runAIAnalysisOn = async (shotsToUse) => {
        const shots = shotsToUse || screenshots;
        if (!apiKey) { alert('Configure d\'abord ta clé API Gemini dans /admin (en bas de page).'); return; }
        if (shots.length === 0) { alert('Upload ou récupère au moins un screenshot.'); return; }
        setAiAnalyzing(true);
        setNotice('');
        try {
          const result = await analyzeCharteAI(apiKey, shots);
          setAiResult(result);
          const patch = {};
          // Couleurs
          if (result.couleurPrimaire) patch.clientPrimaryColor = result.couleurPrimaire;
          if (result.couleurSecondaire) patch.clientSecondaryColor = result.couleurSecondaire;
          if (result.couleurAccent) patch.clientAccentColor = result.couleurAccent;
          if (result.couleurFond) patch.clientBgColor = result.couleurFond;
          if (result.couleurFondAlt) patch.clientBgAltColor = result.couleurFondAlt;
          if (result.couleurTexte) patch.clientTextColor = result.couleurTexte;
          if (result.couleurTexteSubtil) patch.clientMutedTextColor = result.couleurTexteSubtil;
          // Polices
          if (result.policePrimaire) { patch.clientPrimaryFont = result.policePrimaire; loadGoogleFont(result.policePrimaire); }
          if (result.policeSecondaire) { patch.clientSecondaryFont = result.policeSecondaire; loadGoogleFont(result.policeSecondaire); }
          // Tokens design
          if (result.borderRadius) patch.clientBorderRadius = result.borderRadius;
          if (result.styleCartes) patch.clientCardStyle = result.styleCartes;
          if (result.styleBoutons) patch.clientButtonStyle = result.styleBoutons;
          if (result.espacement) patch.clientSpacing = result.espacement;
          if (result.casseTitres) patch.clientTitleCase = result.casseTitres;
          if (result.graisseTitres) patch.clientTitleWeight = result.graisseTitres;
          if (result.letterSpacingTitres) patch.clientTitleLetterSpacing = result.letterSpacingTitres;
          // Méta
          if (result.styleGeneral) patch.clientStyleGeneral = result.styleGeneral;
          if (result.ambiance) patch.clientAmbiance = result.ambiance;
          setData(d => ({ ...d, ...patch }));
          setNotice('✓ Charte complète appliquée — couleurs, polices, espacements, styles cartes/boutons.');
        } catch (e) {
          alert('Erreur analyse IA : ' + e.message);
        } finally {
          setAiAnalyzing(false);
        }
      };

      const runAIAnalysis = () => runAIAnalysisOn(screenshots);

      const handleLogo = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const compressed = await compressImage(file);
          setData(d => ({ ...d, clientLogoUrl: compressed }));
        } catch (err) {
          alert('Erreur compression : ' + err.message);
        }
      };

      const handleScreenshots = async (files) => {
        if (!files || files.length === 0) return;
        const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        if (imageFiles.length === 0) return;
        setExtracting(true);
        try {
          // Compress and store thumbnails
          const compressed = await Promise.all(imageFiles.map(f => compressImage(f)));
          const newShots = [...screenshots, ...compressed];
          setScreenshots(newShots);
          // Extract palette from ALL screenshots (including previous)
          const allFiles = [...imageFiles];
          // For previous shots, convert dataUrl back to blob/file for re-extraction
          for (const dataUrl of screenshots) {
            const blob = await (await fetch(dataUrl)).blob();
            allFiles.push(blob);
          }
          const colors = await extractFromMultiple(allFiles, 6);
          setPalette(colors);
          // Auto-set first 2 colors as primary/secondary
          if (colors[0]) setData(d => ({ ...d, clientPrimaryColor: colors[0] }));
          if (colors[1]) setData(d => ({ ...d, clientSecondaryColor: colors[1] }));
          setNotice(`${colors.length} couleur(s) détectée(s) — ajustez en cliquant ci-dessous si besoin.`);
        } catch (e) {
          alert('Erreur extraction : ' + e.message);
        } finally {
          setExtracting(false);
        }
      };

      const removeScreenshot = (idx) => {
        const newShots = screenshots.filter((_, i) => i !== idx);
        setScreenshots(newShots);
        if (newShots.length === 0) setPalette([]);
      };

      // Drop zone events
      useEffect(() => {
        const zone = dropZoneRef.current;
        if (!zone) return;
        const onDragOver = (e) => { e.preventDefault(); zone.classList.add('drop-active'); };
        const onDragLeave = () => zone.classList.remove('drop-active');
        const onDrop = (e) => {
          e.preventDefault();
          zone.classList.remove('drop-active');
          handleScreenshots(e.dataTransfer.files);
        };
        zone.addEventListener('dragover', onDragOver);
        zone.addEventListener('dragleave', onDragLeave);
        zone.addEventListener('drop', onDrop);
        return () => {
          zone.removeEventListener('dragover', onDragOver);
          zone.removeEventListener('dragleave', onDragLeave);
          zone.removeEventListener('drop', onDrop);
        };
      });

      // Paste from clipboard
      useEffect(() => {
        const onPaste = (e) => {
          const items = e.clipboardData?.items;
          if (!items) return;
          const files = [];
          for (const item of items) {
            if (item.type.startsWith('image/')) {
              const f = item.getAsFile();
              if (f) files.push(f);
            }
          }
          if (files.length > 0) {
            e.preventDefault();
            handleScreenshots(files);
          }
        };
        window.addEventListener('paste', onPaste);
        return () => window.removeEventListener('paste', onPaste);
      });

      const analyzeCharte = () => {
        const text = analysisText;
        const hexMatches = text.match(/#[0-9A-Fa-f]{6}/g) || [];
        const fonts = [];
        const fontLineMatch = text.match(/[Pp]olice[^:]*:\s*([A-Za-zÀ-ÿ\s]+)/g) || [];
        fontLineMatch.forEach(line => {
          const m = line.match(/:\s*([A-Za-zÀ-ÿ\s]+)/);
          if (m) fonts.push(m[1].trim());
        });
        const patch = {};
        if (hexMatches[0]) patch.clientPrimaryColor = hexMatches[0];
        if (hexMatches[1]) patch.clientSecondaryColor = hexMatches[1];
        let foundFont = null;
        for (const f of fonts) {
          const exact = GOOGLE_FONTS.find(g => g.toLowerCase() === f.toLowerCase());
          if (exact) { foundFont = exact; break; }
        }
        if (foundFont) {
          patch.clientPrimaryFont = foundFont;
          setNotice(`Charte appliquée : ${patch.clientPrimaryColor || ''} · ${foundFont}`);
        } else if (fonts[0]) {
          patch.clientPrimaryFont = 'Inter';
          setNotice(`Police "${fonts[0]}" non disponible — Inter utilisée par défaut.`);
        } else {
          setNotice('Couleurs appliquées (aucune police détectée).');
        }
        setData(d => ({ ...d, ...patch }));
      };

      const submit = (e) => {
        e.preventDefault();
        if (!data.dirigeantName.trim() || !data.companyName.trim()) {
          alert('Nom du dirigeant et de l\'entreprise requis.');
          return;
        }
        onCreate(data);
      };

      return (
        <form onSubmit={submit} className="bg-noir-card border border-anthracite rounded-lg p-8 mb-8 fade-in">
          <div className="grid grid-cols-2 gap-6 mb-6">
            <Field label="Nom du dirigeant *">
              <input required value={data.dirigeantName} onChange={e => setData(d => ({...d, dirigeantName: e.target.value}))} className="form-input" />
            </Field>
            <Field label="Nom de l'entreprise *">
              <input required value={data.companyName} onChange={e => setData(d => ({...d, companyName: e.target.value}))} className="form-input" />
            </Field>
            <Field label="Date du rendez-vous">
              <input type="date" value={data.meetingDate} onChange={e => setData(d => ({...d, meetingDate: e.target.value}))} className="form-input" />
            </Field>
            <Field label="Logo client (PNG, JPG, SVG)">
              <input type="file" accept="image/*" onChange={handleLogo} className="form-input" />
              {data.clientLogoUrl && <img src={data.clientLogoUrl} alt="Logo preview" className="mt-2 max-h-12 bg-white p-1 rounded" />}
            </Field>
          </div>

          {/* ===== URL DU SITE CLIENT (RACCOURCI) ===== */}
          <div className="mb-6 pt-6 border-t border-anthracite">
            <label className="block text-xs uppercase tracking-wider text-or mb-2">URL du site prospect (raccourci · screenshot auto)</label>
            <div className="flex gap-2">
              <input
                type="text"
                value={data.clientWebsite}
                onChange={e => setData(d => ({ ...d, clientWebsite: e.target.value }))}
                placeholder="ex: www.lapeyre.fr"
                className="form-input flex-1"
                onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); fetchFromUrl(); } }}
              />
              <button
                type="button"
                onClick={fetchFromUrl}
                disabled={urlFetching || !data.clientWebsite.trim()}
                className="bg-or text-noir px-5 py-2.5 rounded text-xs font-semibold uppercase tracking-wider hover:bg-or-fonce transition disabled:opacity-30 disabled:cursor-not-allowed whitespace-nowrap"
              >
                {urlFetching ? 'Récupération…' : apiKey ? '🌐 Récupérer + Analyser IA' : '🌐 Screenshot URL'}
              </button>
            </div>
            <p className="text-xs text-gray-500 mt-2">
              Screenshot via Microlink (50/jour gratuit). {apiKey && <>Analyse IA enchaînée automatiquement après récupération.</>}
            </p>
          </div>

          {/* ===== CAPTURES DU SITE CLIENT (UPLOAD MANUEL) ===== */}
          <div className="mb-6">
            <label className="block text-xs uppercase tracking-wider text-or mb-2">Ou screenshots manuels — extraction auto de la palette</label>
            <p className="text-xs text-gray-500 mb-3">Glisse-dépose des screenshots (ou colle depuis le presse-papier · Ctrl+V). Les couleurs dominantes seront détectées automatiquement.</p>

            <div
              ref={dropZoneRef}
              className="drop-zone border-2 border-dashed border-anthracite rounded-lg p-6 text-center cursor-pointer hover:border-or/50"
              onClick={() => document.getElementById('shots-input').click()}
            >
              <input
                id="shots-input"
                type="file"
                accept="image/*"
                multiple
                className="hidden"
                onChange={e => { handleScreenshots(e.target.files); e.target.value = ''; }}
              />
              {extracting
                ? <p className="text-or text-sm">Analyse en cours…</p>
                : screenshots.length === 0
                  ? <p className="text-gray-400 text-sm">Glissez les captures ici · ou cliquez pour parcourir · ou collez (Ctrl+V)</p>
                  : <p className="text-gray-300 text-sm">{screenshots.length} capture(s) chargée(s) — ajoutez-en d'autres ou cliquez pour remplacer</p>
              }
            </div>

            {screenshots.length > 0 && (
              <div className="mt-3 flex gap-2 flex-wrap">
                {screenshots.map((s, i) => (
                  <div key={i} className="relative group">
                    <img src={s} alt="" className="h-16 w-24 object-cover rounded border border-anthracite" />
                    <button
                      type="button"
                      onClick={() => removeScreenshot(i)}
                      className="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-rouge text-white text-xs opacity-0 group-hover:opacity-100 transition flex items-center justify-center"
                      title="Retirer"
                    >×</button>
                  </div>
                ))}
              </div>
            )}

            {palette.length > 0 && (
              <div className="mt-4 fade-in">
                <p className="text-[11px] uppercase tracking-wider text-gray-400 mb-2">Palette détectée — cliquez pour définir</p>
                <div className="flex gap-2 flex-wrap">
                  {palette.map((color, i) => (
                    <div key={i} className="flex flex-col gap-1.5 items-center">
                      <div
                        className="palette-swatch w-12 h-12 rounded cursor-pointer border border-white/10"
                        style={{ background: color }}
                        title={color}
                      />
                      <span className="text-[10px] text-gray-400 font-mono">{color}</span>
                      <div className="flex gap-1">
                        <button type="button" onClick={() => setData(d => ({ ...d, clientPrimaryColor: color }))} className={`text-[9px] px-1.5 py-0.5 rounded transition ${data.clientPrimaryColor === color ? 'bg-or text-noir' : 'bg-noir border border-anthracite text-gray-400 hover:border-or'}`}>1aire</button>
                        <button type="button" onClick={() => setData(d => ({ ...d, clientSecondaryColor: color }))} className={`text-[9px] px-1.5 py-0.5 rounded transition ${data.clientSecondaryColor === color ? 'bg-or text-noir' : 'bg-noir border border-anthracite text-gray-400 hover:border-or'}`}>2aire</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Analyse IA complète */}
            {screenshots.length > 0 && (
              <div className="mt-5 pt-4 border-t border-anthracite/50">
                <div className="flex items-center justify-between">
                  <div>
                    <p className="text-[11px] uppercase tracking-wider text-or font-semibold">Analyse IA complète (Google Gemini · gratuit)</p>
                    <p className="text-xs text-gray-500 mt-0.5">
                      {apiKey
                        ? <>Couleurs + polices + style général + ambiance</>
                        : <>Clé Gemini non configurée — voir paramètres en bas de /admin</>
                      }
                    </p>
                  </div>
                  <button
                    type="button"
                    onClick={runAIAnalysis}
                    disabled={!apiKey || aiAnalyzing}
                    className="bg-or text-noir px-5 py-2.5 rounded text-sm font-semibold uppercase tracking-wider hover:bg-or-fonce transition disabled:opacity-30 disabled:cursor-not-allowed"
                  >
                    {aiAnalyzing ? 'Analyse en cours…' : '✦ Analyser avec IA'}
                  </button>
                </div>
                {aiResult && (
                  <div className="mt-4 p-4 bg-noir border border-or/20 rounded text-xs space-y-1.5 fade-in">
                    {aiResult.styleGeneral && <p><span className="text-or uppercase tracking-wider text-[10px] mr-2">Style</span> <span className="text-gray-200">{aiResult.styleGeneral}</span></p>}
                    {aiResult.ambiance && <p><span className="text-or uppercase tracking-wider text-[10px] mr-2">Ambiance</span> <span className="text-gray-200 italic">{aiResult.ambiance}</span></p>}
                    {aiResult.policePrimaire && <p><span className="text-or uppercase tracking-wider text-[10px] mr-2">Police</span> <span className="text-gray-200">{aiResult.policePrimaire}{aiResult.policeSecondaire && ` · ${aiResult.policeSecondaire}`}</span></p>}
                    <p className="flex items-center gap-2 mt-2">
                      <span className="text-or uppercase tracking-wider text-[10px]">Couleurs</span>
                      {[aiResult.couleurPrimaire, aiResult.couleurSecondaire, aiResult.couleurAccent].filter(Boolean).map((c, i) => (
                        <span key={i} className="inline-flex items-center gap-1">
                          <span className="w-4 h-4 rounded border border-white/20" style={{ background: c }} />
                          <span className="text-gray-300 font-mono">{c}</span>
                        </span>
                      ))}
                    </p>
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="mb-6">
            <label className="block text-xs uppercase tracking-wider text-or mb-2">Méthode alternative : analyse texte (collez la réponse d'une IA)</label>
            <textarea
              value={analysisText}
              onChange={e => setAnalysisText(e.target.value)}
              rows={5}
              placeholder={"Couleur principale : #1E5F8E\nCouleur secondaire : #F5A623\nPolice principale : Roboto\nStyle général : Modern, industrial"}
              className="form-input font-mono text-sm"
            />
            <div className="flex gap-3 mt-3">
              <button type="button" onClick={analyzeCharte} className="bg-or text-noir px-4 py-2 rounded text-sm font-semibold uppercase tracking-wider hover:bg-or-fonce transition">
                Analyser et appliquer la charte
              </button>
              {notice && <p className="text-xs text-or self-center">{notice}</p>}
            </div>
          </div>

          <div className="grid grid-cols-3 gap-4 mb-6 pt-6 border-t border-anthracite">
            <Field label="Couleur principale">
              <div className="flex gap-2">
                <input type="color" value={data.clientPrimaryColor} onChange={e => setData(d => ({...d, clientPrimaryColor: e.target.value}))} className="h-10 w-12 rounded border border-anthracite bg-noir cursor-pointer" />
                <input type="text" value={data.clientPrimaryColor} onChange={e => setData(d => ({...d, clientPrimaryColor: e.target.value}))} className="form-input flex-1" />
              </div>
            </Field>
            <Field label="Couleur secondaire">
              <div className="flex gap-2">
                <input type="color" value={data.clientSecondaryColor} onChange={e => setData(d => ({...d, clientSecondaryColor: e.target.value}))} className="h-10 w-12 rounded border border-anthracite bg-noir cursor-pointer" />

    // Compression Canvas
    const compressImage = (file) => new Promise((resolve, reject) => {
      if (file.type === 'image/svg+xml') {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
        return;
      }
      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => {
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxW = 600;
          const ratio = Math.min(1, maxW / img.width);
          canvas.width = img.width * ratio;
          canvas.height = img.height * ratio;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = reject;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ===== EXTRACTION COULEURS DOMINANTES =====
    // Algo : quantification 5-bit + bucket count, filtrage blanc/noir/gris,
    // groupe les couleurs proches, retourne top N classées par fréquence × saturation.
    const fileToImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => resolve({ img, dataUrl: e.target.result });
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const extractDominantColors = async (file, maxColors = 6) => {
      const { img } = await fileToImage(file);
      const canvas = document.createElement('canvas');
      const targetW = 200;
      const ratio = targetW / img.width;
      canvas.width = targetW;
      canvas.height = Math.round(img.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

      const buckets = {};
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 200) continue;
        // Quantize 5-bit per channel
        const qr = (r >> 3) << 3, qg = (g >> 3) << 3, qb = (b >> 3) << 3;
        const max = Math.max(qr, qg, qb), min = Math.min(qr, qg, qb);
        const lum = 0.299*qr + 0.587*qg + 0.114*qb;
        // Skip near-white, near-black, near-gray
        if (lum > 245) continue;
        if (lum < 15) continue;
        if (max - min < 25) continue;
        const key = `${qr},${qg},${qb}`;
        buckets[key] = (buckets[key] || 0) + 1;
      }

      // Score : frequency × (1 + saturation)
      const scored = Object.entries(buckets).map(([key, count]) => {
        const [r,g,b] = key.split(',').map(Number);
        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        const sat = max === 0 ? 0 : (max - min) / max;
        return { key, count, sat, score: count * (1 + sat * 0.5) };
      });
      scored.sort((a,b) => b.score - a.score);

      // Merge near-duplicates (distance < 30 in RGB)
      const final = [];
      for (const s of scored) {
        const [r,g,b] = s.key.split(',').map(Number);
        const close = final.find(f => {
          const [fr,fg,fb] = f.key.split(',').map(Number);
          return Math.abs(fr-r) + Math.abs(fg-g) + Math.abs(fb-b) < 60;
        });
        if (!close) final.push(s);
        if (final.length >= maxColors) break;
      }

      return final.map(s => {
        const [r,g,b] = s.key.split(',').map(Number);
        return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
      });
    };

    // ===== SCREENSHOT URL VIA MICROLINK (gratuit, 50/jour sans clé) =====
    const fetchUrlScreenshot = async (url) => {
      // Normaliser l'URL
      let target = url.trim();
      if (!/^https?:\/\//i.test(target)) target = 'https://' + target;

      const params = new URLSearchParams({
        url: target,
        screenshot: 'true',
        meta: 'false',
        'viewport.width': '1280',
        'viewport.height': '900',
        'viewport.deviceScaleFactor': '1',
        waitUntil: 'load',
        'screenshot.type': 'png',
      });
      const apiUrl = `https://api.microlink.io/?${params.toString()}`;

      const response = await fetch(apiUrl);
      if (!response.ok) throw new Error(`Microlink HTTP ${response.status}`);
      const data = await response.json();
      if (data.status !== 'success') throw new Error('Microlink : ' + (data.message || 'erreur inconnue'));
      const screenshotUrl = data?.data?.screenshot?.url;
      if (!screenshotUrl) throw new Error('Aucun screenshot retourné par Microlink.');

      // Récupérer l'image et la convertir en dataURL
      const imgResp = await fetch(screenshotUrl);
      if (!imgResp.ok) throw new Error('Impossible de récupérer le screenshot.');
      const blob = await imgResp.blob();
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    };

    // ===== ANALYSE IA VISION (Google Gemini 2.0 Flash — Free Tier) =====
    const analyzeCharteAI = async (apiKey, screenshotDataUrls) => {
      if (!apiKey) throw new Error('Clé API Google Gemini manquante.');
      if (!screenshotDataUrls || screenshotDataUrls.length === 0) throw new Error('Aucune capture à analyser.');

      const imageParts = screenshotDataUrls.slice(0, 10).map(dataUrl => {
        const [meta, b64] = dataUrl.split(',');
        const mimeType = meta.match(/data:([^;]+)/)?.[1] || 'image/png';
        return { inline_data: { mime_type: mimeType, data: b64 } };
      });

      const prompt = `Tu es un expert en branding et design system. Analyse précisément ces captures d'écran d'un site d'entreprise (PME française du BTP / menuiserie souvent).

Ton objectif : extraire TOUS les tokens de design pour qu'on puisse recréer une page qui ressemble à ce site.

Retourne UN SEUL objet JSON valide au format exact suivant :

{
  "couleurPrimaire": "#XXXXXX",
  "couleurSecondaire": "#XXXXXX",
  "couleurAccent": "#XXXXXX",
  "couleurFond": "#XXXXXX",
  "couleurFondAlt": "#XXXXXX",
  "couleurTexte": "#XXXXXX",
  "couleurTexteSubtil": "#XXXXXX",
  "policePrimaire": "Nom Google Fonts",
  "policeSecondaire": "Nom Google Fonts",
  "borderRadius": "0px" | "2px" | "4px" | "8px" | "12px" | "16px" | "24px" | "9999px",
  "styleCartes": "flat" | "shadow" | "bordered" | "elevated",
  "styleBoutons": "filled" | "outlined" | "pill" | "ghost",
  "espacement": "tight" | "balanced" | "airy",
  "casseTitres": "uppercase" | "capitalize" | "none",
  "graisseTitres": "400" | "500" | "600" | "700" | "800" | "900",
  "letterSpacingTitres": "normal" | "tight" | "wide" | "extra-wide",
  "styleGeneral": "modèle court ex: moderne industriel, premium classique, minimaliste, traditionnel artisanal",
  "ambiance": "phrase courte décrivant l'identité visuelle (max 15 mots)"
}

Règles strictes :
- Couleurs en HEX 6 chiffres, fidèles aux captures
- couleurFond = couleur dominante de fond de page (souvent blanc / blanc cassé / gris très clair)
- couleurFondAlt = couleur de fond secondaire (sections alternées)
- couleurTexte = couleur principale du corps de texte (souvent gris foncé / noir)
- couleurTexteSubtil = couleur des métadonnées (souvent gris moyen)
- Polices : noms Google Fonts exacts, sinon le plus proche
- borderRadius : observe les angles des boutons et cartes
- styleCartes : flat (sans ombre), shadow (ombre douce), bordered (bordure fine), elevated (ombre forte)
- styleBoutons : filled (fond plein), outlined (bordure + texte), pill (très arrondi), ghost (texte seul)
- espacement : tight (compact), balanced (standard), airy (généreux, beaucoup de blanc)
- casseTitres : observe les titres principaux (CAPITALES, Capitalisé Normal, ou pas)
- graisseTitres : observe l'épaisseur des titres
- letterSpacingTitres : tight (lettres serrées), normal, wide (légèrement espacé), extra-wide (très espacé)
- Sois précis et fidèle aux captures, jamais inventer.`;

      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [...imageParts, { text: prompt }],
          }],
          generationConfig: {
            response_mime_type: 'application/json',
            temperature: 0.2,
            max_output_tokens: 2048,
          },
        }),
      });

      if (!response.ok) {
        const errText = await response.text();
        let errMsg = `Erreur API (${response.status})`;
        try {
          const errJson = JSON.parse(errText);
          errMsg = errJson.error?.message || errMsg;
        } catch {}
        throw new Error(errMsg);
      }

      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (!text) throw new Error('Réponse IA vide.');

      try {
        return JSON.parse(text);
      } catch {
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('Réponse IA invalide (pas de JSON détecté).');
        try { return JSON.parse(match[0]); }
        catch { throw new Error('JSON IA mal formé.'); }
      }
    };

    const loadGoogleFont = (fontName) => {
      if (!fontName || fontName === 'Inter') return;
      const id = 'font-' + fontName.replace(/\s+/g,'-');
      if (document.getElementById(id)) return;
      const link = document.createElement('link');
      link.id = id;
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g,'+')}:wght@400;500;600;700&display=swap`;

    const extractFromMultiple = async (files, maxColors = 6) => {
      const allColors = [];
      for (const f of files) {
        try {
          const cols = await extractDominantColors(f, maxColors);
          allColors.push(...cols);
        } catch (e) { console.warn('Color extraction failed', e); }
      }
      // Aggregate : count occurrences across screenshots
      const counts = {};
      allColors.forEach(c => { counts[c] = (counts[c] || 0) + 1; });
      // Merge near-duplicates again across screenshots
      const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
      const final = [];
      for (const [hex] of sorted) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        const close = final.find(f => {
          const fr = parseInt(f.slice(1,3),16), fg = parseInt(f.slice(3,5),16), fb = parseInt(f.slice(5,7),16);
          return Math.abs(fr-r) + Math.abs(fg-g) + Math.abs(fb-b) < 60;
        });
        if (!close) final.push(hex);
        if (final.length >= maxColors) break;
      }
      return final;
    };
