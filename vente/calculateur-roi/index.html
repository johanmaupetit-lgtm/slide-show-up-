          <div className="dev-switch-zone" onClick={triggerSwitch} title="" />
          {devMode && (
            <button onClick={triggerSwitch} className="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] bg-rouge text-white text-xs px-3 py-1 rounded uppercase tracking-wider">
              Mode : {mode} (dev)
            </button>
          )}
          <div className={`mode-transition ${transitioning ? 'opacity-0' : 'opacity-100'}`}>
            {mode === 'pertes'
              ? <ModePertes session={session} updateInputs={updateInputs} updateCauses={updateCauses} updateMarketOverride={updateMarketOverride} marketRates={marketRates} />
              : <ModeGains session={session} scenario={scenario} setScenario={setScenario} marketRates={marketRates} />
            }
          </div>
        </>
      );
    };

    // ============================================================
    // MODE PERTES
    // ============================================================

    // ===== DESIGN TOKENS depuis session =====
    const computeTokens = (session) => {
      const lsMap = { tight: '-0.01em', normal: '0', wide: '0.05em', 'extra-wide': '0.15em' };
      const lsLabelMap = { normal: '0.06em', wide: '0.1em', 'extra-wide': '0.2em' };
      const spacingMap = {
        tight:    { sectionGap: '24px', cardPadding: '20px', maxWidth: '1000px', rowGap: '8px' },
        balanced: { sectionGap: '40px', cardPadding: '32px', maxWidth: '1100px', rowGap: '12px' },
        airy:     { sectionGap: '64px', cardPadding: '48px', maxWidth: '1200px', rowGap: '20px' },
      };
      const titleScaleMap = {
        compact: { h1: '24px', h2: '14px', big: '36px', huge: '52px' },
        normal:  { h1: '28px', h2: '16px', big: '40px', huge: '64px' },
        large:   { h1: '34px', h2: '18px', big: '48px', huge: '76px' },
        massive: { h1: '42px', h2: '22px', big: '60px', huge: '92px' },
      };
      const shadowMap = {
        none:   { card: 'none', cardElev: '0 1px 3px rgba(0,0,0,0.04)', float: '0 2px 6px rgba(0,0,0,0.06)' },
        soft:   { card: '0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04)', cardElev: '0 4px 12px rgba(0,0,0,0.08)', float: '0 6px 20px rgba(0,0,0,0.10)' },
        medium: { card: '0 2px 6px rgba(0,0,0,0.10), 0 6px 16px rgba(0,0,0,0.06)', cardElev: '0 8px 24px rgba(0,0,0,0.10)', float: '0 12px 32px rgba(0,0,0,0.14)' },
        strong: { card: '0 4px 12px rgba(0,0,0,0.14), 0 12px 28px rgba(0,0,0,0.10)', cardElev: '0 16px 40px rgba(0,0,0,0.16)', float: '0 24px 56px rgba(0,0,0,0.22)' },
      };
      const separatorMap = {
        none:     { width: 0, style: 'none' },
        thin:     { width: 1, style: 'solid' },
        medium:   { width: 2, style: 'solid' },
        thick:    { width: 3, style: 'solid' },
        double:   { width: 3, style: 'double' },
        gradient: { width: 1, style: 'solid' },
      };
      const sp = spacingMap[session.clientSpacing] || spacingMap.balanced;
      const ts = titleScaleMap[session.clientTitleScale] || titleScaleMap.normal;
      const shadows = shadowMap[session.clientShadowStyle] || shadowMap.soft;
      const sep = separatorMap[session.clientSeparatorStyle] || separatorMap.thin;
      const primary = session.clientPrimaryColor || '#1E5F8E';
      const border = session.clientBorderColor || lightenHex(primary, 0.85);
      return {
        primary,
        secondary: session.clientSecondaryColor || '#888888',
        accent: session.clientAccentColor || primary,
        bg: session.clientBgColor || '#FAFAFA',
        bgAlt: session.clientBgAltColor || '#FFFFFF',
        text: session.clientTextColor || '#1A1A1A',
        mutedText: session.clientMutedTextColor || '#666666',
        success: session.clientSuccessColor || '#3A8A3A',
        danger: session.clientDangerColor || '#B91C1C',
        border,
        font: session.clientPrimaryFont || 'Inter',
        headingFont: session.clientSecondaryFont || session.clientPrimaryFont || 'Inter',
        radius: session.clientBorderRadius || '4px',
        cardStyle: session.clientCardStyle || 'flat',
        buttonStyle: session.clientButtonStyle || 'filled',
        inputStyle: session.clientInputStyle || 'bordered',
        iconStyle: session.clientIconStyle || 'minimal',
        shadows,
        sep,
        titleCase: session.clientTitleCase || 'none',
        titleWeight: session.clientTitleWeight || '700',
        titleLetterSpacing: lsMap[session.clientTitleLetterSpacing] || '0',
        labelLetterSpacing: lsLabelMap[session.clientLabelLetterSpacing] || '0.1em',
        bandeauStyle: session.clientBandeauStyle || 'flat',
        bandeauGradient: session.clientBandeauGradient || '',
        decorative: session.clientDecorative || 'none',
        sizes: ts,
        sectionGap: sp.sectionGap,
        cardPadding: sp.cardPadding,
        maxWidth: sp.maxWidth,
        rowGap: sp.rowGap,
        primaryLight: lightenHex(primary, 0.92),
        primaryFaint: lightenHex(primary, 0.96),
        tagline: session.clientTagline || '',
        secteur: session.clientSecteur || '',
        cta: session.clientCtaTexte || '',
      };
    };

    const cardCSS = (tokens) => {
      const base = { background: tokens.bgAlt, borderRadius: tokens.radius, padding: tokens.cardPadding };
      if (tokens.cardStyle === 'shadow') return { ...base, boxShadow: tokens.shadows.card };
      if (tokens.cardStyle === 'bordered') return { ...base, border: `1px solid ${tokens.border}` };
      if (tokens.cardStyle === 'elevated') return { ...base, boxShadow: tokens.shadows.cardElev };
      return base; // flat
    };

    const buttonCSS = (tokens) => {
      const base = { borderRadius: tokens.buttonStyle === 'pill' ? '9999px' : tokens.radius, fontWeight: 600, transition: 'all 0.15s', cursor: 'pointer' };
      if (tokens.buttonStyle === 'filled') return { ...base, background: tokens.primary, color: tokens.bgAlt, border: 'none' };
      if (tokens.buttonStyle === 'outlined') return { ...base, background: 'transparent', color: tokens.primary, border: `1.5px solid ${tokens.primary}` };
      if (tokens.buttonStyle === 'pill') return { ...base, background: tokens.primary, color: tokens.bgAlt, border: 'none' };
      if (tokens.buttonStyle === 'ghost') return { ...base, background: 'transparent', color: tokens.primary, border: 'none' };
      return base;
    };

    const titleCSS = (tokens, sizeKey) => ({
      fontFamily: `'${tokens.headingFont}', sans-serif`,
      fontWeight: tokens.titleWeight,
      letterSpacing: tokens.titleLetterSpacing,
      textTransform: tokens.titleCase === 'uppercase' ? 'uppercase' : tokens.titleCase === 'capitalize' ? 'capitalize' : 'none',
      color: tokens.text,
      ...(sizeKey ? { fontSize: tokens.sizes[sizeKey] } : {}),
    });

    const labelCSS = (tokens) => ({
      fontSize: '11px',
      textTransform: 'uppercase',
      letterSpacing: tokens.labelLetterSpacing,
      color: tokens.mutedText,
      fontFamily: `'${tokens.font}', sans-serif`,
    });

    const separatorCSS = (tokens, color) => {
      const c = color || tokens.border;
      if (tokens.sep.style === 'none') return { borderTop: 'none' };
      return { borderTop: `${tokens.sep.width}px ${tokens.sep.style} ${c}` };
    };

    const bandeauCSS = (tokens) => {
      if (tokens.bandeauStyle === 'gradient') {
        return { background: tokens.bandeauGradient || `linear-gradient(135deg, ${tokens.primary} 0%, ${lightenHex(tokens.primary, -0.2)} 100%)`, color: tokens.bgAlt, isColored: true };
      }
      if (tokens.bandeauStyle === 'pattern') {
        return { background: tokens.bgAlt, backgroundImage: `radial-gradient(${tokens.primaryLight} 1px, transparent 1px)`, backgroundSize: '24px 24px', isColored: false };
      }
      // FLAT : on tape un fond très subtil dérivé du primary pour donner de l'identité,
      // pas un blanc plat.
      return { background: tokens.primaryFaint, isColored: false };
    };

    const inputCSS = (tokens) => {
      const common = { width: '100%', fontSize: '16px', fontWeight: 600, color: tokens.text, fontVariantNumeric: 'tabular-nums', fontFamily: `'${tokens.font}', sans-serif`, outline: 'none', transition: 'border-color 0.15s, background 0.15s', padding: '10px 12px' };
      if (tokens.inputStyle === 'underline') return { ...common, background: 'transparent', border: 'none', borderBottom: `2px solid ${tokens.border}`, borderRadius: 0, padding: '8px 4px' };
      if (tokens.inputStyle === 'filled')    return { ...common, background: tokens.primaryFaint, border: `1px solid transparent`, borderRadius: tokens.radius };
      if (tokens.inputStyle === 'rounded')   return { ...common, background: tokens.bgAlt, border: `1.5px solid ${tokens.border}`, borderRadius: '9999px', padding: '10px 18px' };
      return { ...common, background: tokens.bgAlt, border: `1.5px solid ${tokens.border}`, borderRadius: tokens.radius };
    };

    const ModePertes = ({ session, updateInputs, updateCauses, updateMarketOverride, marketRates }) => {
      const [expanded, setExpanded] = useState(false);
      const losses = useMemo(() => calcLosses(session.inputs, marketRates), [session.inputs, marketRates]);
      const allFilled = ['leadsRecus','rdvPris','signatures','ticket'].every(k => +session.inputs[k] > 0);
      const t = computeTokens(session);
      const accent = t.accent && t.accent !== t.primary ? t.accent : lightenHex(t.primary, 0.55);

      return (
        <div style={{ background: t.bg, color: t.text, minHeight: '100vh', fontFamily: `'${t.font}', Inter, sans-serif` }}>
          {/* ============================================================ */}
          {/* === HERO — composition propre, primary + accent ============ */}
          {/* ============================================================ */}
          <div style={{ position: 'relative', overflow: 'hidden', background: t.primary, color: '#FFFFFF' }}>
            {/* Top stripe accent */}
            <div style={{ height: '6px', background: `linear-gradient(90deg, ${accent} 0%, ${accent} 40%, ${t.primary} 40%, ${t.primary} 100%)` }} />

            {/* Decorative diagonal accent (bandeau jaune à 45° côté droit) */}
            <div style={{
              position: 'absolute', top: 0, right: 0, bottom: 0,
              width: '38%',
              background: `linear-gradient(105deg, transparent 0%, transparent 18%, ${lightenHex(t.primary, -0.18)} 18%, ${lightenHex(t.primary, -0.18)} 100%)`,
              opacity: 0.55,
              pointerEvents: 'none',
            }} />
            <div style={{
              position: 'absolute', top: 0, right: 0, bottom: 0,
              width: '12%',
              background: `linear-gradient(105deg, transparent 0%, transparent 60%, ${accent} 60%, ${accent} 100%)`,
              opacity: 0.85,
              pointerEvents: 'none',
            }} />

            <div style={{ position: 'relative', maxWidth: t.maxWidth, margin: '0 auto', padding: '36px 48px 44px', zIndex: 1 }}>
              {/* Top row : badge + dirigeant */}
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '24px', marginBottom: '48px' }}>
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: '10px', padding: '8px 14px', background: 'rgba(0,0,0,0.18)', borderRadius: t.buttonStyle === 'pill' ? '9999px' : t.radius, border: '1px solid rgba(255,255,255,0.22)' }}>
                  <span style={{ width: '7px', height: '7px', borderRadius: '50%', background: accent, boxShadow: `0 0 0 3px rgba(${parseInt(accent.slice(1,3),16)}, ${parseInt(accent.slice(3,5),16)}, ${parseInt(accent.slice(5,7),16)}, 0.25)` }} />
                  <span style={{ fontSize: '11px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing, color: '#FFFFFF' }}>Audit ROI personnalisé</span>
                </div>
                <div style={{ textAlign: 'right', color: '#FFFFFF', borderLeft: `2px solid ${accent}`, paddingLeft: '20px' }}>
                  <p style={{ ...labelCSS(t), color: 'rgba(255,255,255,0.7)', margin: 0, fontSize: '10px' }}>Préparé pour</p>
                  <p style={{ margin: '4px 0 0', fontWeight: 800, fontSize: '20px', fontFamily: `'${t.headingFont}', sans-serif`, lineHeight: 1.1 }}>{session.dirigeantName}</p>
                  <p style={{ margin: '4px 0 0', fontSize: '12px', opacity: 0.85 }}>{new Date(session.meetingDate).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })}</p>
                </div>
              </div>

              {/* Bloc principal : logo + nom + tagline */}
              <div style={{ display: 'flex', alignItems: 'center', gap: '32px' }}>
                {session.clientLogoUrl
                  ? <img src={session.clientLogoUrl} alt={session.companyName} style={{ height: '88px', maxWidth: '240px', objectFit: 'contain', filter: 'brightness(0) invert(1)', flexShrink: 0 }} />
                  : <div style={{
                      width: '88px', height: '88px',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      background: accent, color: lightenHex(accent, -0.55),
                      borderRadius: t.radius,
                      fontFamily: `'${t.headingFont}', sans-serif`,
                      fontWeight: 900, fontSize: '34px',
                      letterSpacing: '-0.02em',
                      boxShadow: '0 8px 24px rgba(0,0,0,0.25)',
                      flexShrink: 0,
                    }}>{session.companyName.substring(0,2).toUpperCase()}</div>
                }
                <div style={{ flex: 1, minWidth: 0 }}>
                  <h1 style={{
                    ...titleCSS(t, 'h1'),
                    color: '#FFFFFF',
                    margin: 0,
                    lineHeight: 1.0,
                    fontSize: 'clamp(34px, 4.5vw, 56px)',
                    letterSpacing: '-0.02em',
                  }}>{session.companyName}</h1>
                  {t.tagline && (
                    <p style={{ color: 'rgba(255,255,255,0.92)', fontSize: '18px', marginTop: '10px', fontStyle: 'italic', fontWeight: 500, lineHeight: 1.3 }}>{t.tagline}</p>
                  )}
                  <div style={{ display: 'flex', gap: '8px', marginTop: '18px', flexWrap: 'wrap' }}>
                    {t.secteur && (
                      <span style={{
                        background: accent,
                        color: lightenHex(accent, -0.6),
                        padding: '6px 14px',
                        borderRadius: t.buttonStyle === 'pill' ? '9999px' : t.radius,
                        fontSize: '11px', fontWeight: 800,
                        textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing,
                      }}>{t.secteur.replace(/-/g, ' ')}</span>
                    )}
                    {session.clientTonalite && (
                      <span style={{
                        background: 'transparent',
                        color: '#FFFFFF',
                        border: '1px solid rgba(255,255,255,0.5)',
                        padding: '6px 14px',
                        borderRadius: t.buttonStyle === 'pill' ? '9999px' : t.radius,
                        fontSize: '11px', fontWeight: 700,
                        textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing,
                      }}>{session.clientTonalite}</span>
                    )}
                  </div>
                </div>
              </div>
            </div>

            {/* Bottom stripe — séparation nette avec le body */}
            <div style={{ height: '3px', background: accent }} />
          </div>

          <div style={{ maxWidth: t.maxWidth, margin: '0 auto', padding: `${t.sectionGap} ${parseInt(t.cardPadding)*1.2}px` }}>
            {/* Inputs panel */}
            <InputsPanel session={session} updateInputs={updateInputs} t={t} />

            {/* Activité commerciale */}
            <ActivityBlock session={session} losses={losses} expanded={expanded} setExpanded={setExpanded} t={t} />

            {/* Comparison expanded */}
            {expanded && (
              <div style={{ marginTop: t.sectionGap }} className="fade-in">
                <ComparisonBlock losses={losses} session={session} updateCauses={updateCauses} updateMarketOverride={updateMarketOverride} marketRates={marketRates} t={t} />
                <TotalsBlock losses={losses} t={t} />
              </div>
            )}

            {/* 3 axes */}
            {expanded && allFilled && <ThreeAxesBlock t={t} />}
          </div>
        </div>
      );
    };

    const InputsPanel = ({ session, updateInputs, t }) => {
      const baseInputStyle = inputCSS(t);
      const Input = ({ k, label, suffix = '' }) => (
        <div>
          <label style={{ ...labelCSS(t), display: 'block', marginBottom: '4px' }}>{label}</label>
          <div style={{ position: 'relative' }}>
            <input
              type="number"
              value={session.inputs[k] ?? ''}
              onChange={e => updateInputs({ [k]: e.target.value })}
              placeholder="0"
              style={baseInputStyle}
              onFocus={e => { if (t.inputStyle !== 'underline') e.target.style.borderColor = t.primary; else e.target.style.borderBottomColor = t.primary; }}
              onBlur={e => { if (t.inputStyle !== 'underline') e.target.style.borderColor = t.border; else e.target.style.borderBottomColor = t.border; }}
            />
            {suffix && <span style={{ position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)', color: t.mutedText, fontSize: '13px' }}>{suffix}</span>}
          </div>
        </div>
      );
      return (
        <div style={{ marginBottom: t.sectionGap }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: '12px', marginBottom: '20px' }}>
            <span style={{ ...labelCSS(t), color: t.primary, fontWeight: 700 }}>Vos chiffres</span>
            <span style={{ flex: 1, height: '1px', background: t.primaryLight }} />
            <span style={{ ...labelCSS(t), color: t.mutedText, fontSize: '10px' }}>Saisissez les 7 valeurs</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '12px' }}>
          <Input k="leadsRecus" label="Leads reçus/mois" />
          <Input k="leadsTraites" label="Leads traités" />
          <Input k="rdvPris" label="RDV pris" />
          <Input k="rdvHonores" label="RDV honorés" />
          <Input k="signatures" label="Signatures" />
          <Input k="ticket" label="Ticket €" suffix="€" />
          <Input k="devisDormants" label="Devis dormants" />
          </div>
        </div>
      );
    };

    const ActivityBlock = ({ session, losses, expanded, setExpanded, t }) => {
      const i = session.inputs;
      const Row = ({ label, value, isTotal = false }) => (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: isTotal ? '0' : '12px 0', borderTop: isTotal ? 'none' : `1px solid ${t.primaryLight}` }}>
          <span style={{ color: isTotal ? t.text : t.mutedText, fontSize: isTotal ? '15px' : '14px', fontWeight: isTotal ? 700 : 500, textTransform: isTotal ? 'uppercase' : 'none', letterSpacing: isTotal ? t.labelLetterSpacing : 'normal' }}>{label}</span>
          <span style={{ color: isTotal ? t.primary : t.text, fontSize: isTotal ? t.sizes.big : '17px', fontWeight: isTotal ? 800 : 600, fontVariantNumeric: 'tabular-nums', fontFamily: `'${t.font}', sans-serif`, letterSpacing: isTotal ? '-0.02em' : 'normal' }}>{value}</span>
        </div>
      );
      return (
        <div style={{ ...cardCSS(t), borderTop: `4px solid ${t.primary}`, borderTopLeftRadius: t.radius, borderTopRightRadius: t.radius, position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '24px', paddingBottom: '16px', borderBottom: `2px solid ${t.primaryLight}` }}>
            <div>
              <p style={{ ...labelCSS(t), color: t.primary, margin: '0 0 4px 0' }}>Étape 01</p>
              <h2 style={{ ...titleCSS(t, 'h2'), margin: 0 }}>Votre activité commerciale</h2>
            </div>
            <button
              onClick={() => setExpanded(e => !e)}
              style={{ width: '52px', height: '52px', borderRadius: t.buttonStyle === 'pill' ? '9999px' : t.radius, display: 'flex', alignItems: 'center', justifyContent: 'center', color: t.bgAlt, fontWeight: 'bold', background: t.primary, border: 'none', cursor: 'pointer', fontSize: '22px', transition: 'transform 0.15s', boxShadow: t.shadows.float }}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.08)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
              title="Comparer au marché"
            >
              {expanded ? '↙' : '↗'}
            </button>
          </div>
          <div>
            <Row label="Leads reçus / mois" value={formatNumber(+i.leadsRecus)} />
            <Row label="Leads traités" value={formatNumber(+i.leadsTraites)} />
            <Row label="RDV pris" value={formatNumber(+i.rdvPris)} />
            <Row label="RDV honorés" value={formatNumber(+i.rdvHonores)} />
            <Row label="Signatures" value={formatNumber(+i.signatures)} />
            <Row label="Ticket moyen" value={formatEUR(+i.ticket)} />
            <Row label="Devis dormants" value={formatNumber(+i.devisDormants)} />
          </div>
          <div style={{ marginTop: '28px', paddingTop: '24px', background: t.primaryFaint, margin: `28px ${'-'+t.cardPadding} ${'-'+t.cardPadding}`, padding: `24px ${t.cardPadding}`, borderBottomLeftRadius: t.radius, borderBottomRightRadius: t.radius, borderTop: `3px solid ${t.primary}` }}>
            <Row label="CA actuel" value={`${formatEUR(losses.caActuel)} /mois`} isTotal />
          </div>
        </div>
      );
    };

    const ComparisonBlock = ({ losses, session, updateCauses, updateMarketOverride, marketRates, t }) => {
      const stepsOrder = ['leadTraite', 'leadRdv', 'rdvHonore', 'devisSignature'];
      return (
        <div style={{ ...cardCSS(t), marginTop: '24px', borderTop: `4px solid ${t.danger}` }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '24px', paddingBottom: '16px', borderBottom: `2px solid ${lightenHex(t.danger, 0.85)}` }}>
            <div>
              <p style={{ ...labelCSS(t), color: t.danger, margin: '0 0 4px 0' }}>Étape 02 · Pertes invisibles</p>
              <h2 style={{ ...titleCSS(t, 'h2'), margin: 0 }}>Comparaison avec le marché</h2>
            </div>
            <span style={{ fontSize: '11px', color: t.mutedText, textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing }}>Sources indépendantes ↓</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '28px' }}>
            {stepsOrder.map(key => (
              <ComparisonRow key={key} stepKey={key} step={losses.steps[key]} cause={session.causes[key]} updateCause={(v) => updateCauses({ [key]: v })} updateMarketOverride={(v) => updateMarketOverride(key, v)} t={t} />
            ))}
          </div>
          <div style={{ marginTop: '32px', paddingTop: '32px', borderTop: `2px dashed ${t.primaryLight}` }}>
            <ComparisonRow stepKey="devisDormants" step={losses.steps.devisDormants} cause={session.causes.devisDormants} updateCause={(v) => updateCauses({ devisDormants: v })} updateMarketOverride={(v) => updateMarketOverride('devisDormants', v)} t={t} isOneShot />
          </div>
        </div>
      );
    };

    const ComparisonRow = ({ stepKey, step, cause, updateCause, updateMarketOverride, t, isOneShot }) => {
      const [editingCause, setEditingCause] = useState(false);
      const [editingMarket, setEditingMarket] = useState(false);
      const [marketDraft, setMarketDraft] = useState(Math.round(step.marketRate * 100));
      const source = SOURCES[stepKey];
      const dangerLight = lightenHex(t.danger, 0.85);

      return (
        <div style={{ paddingLeft: '16px', borderLeft: `3px solid ${t.primary}` }}>
          <p style={{ ...labelCSS(t), marginBottom: '4px' }}>{STEP_LABELS[stepKey]}</p>
          <p style={{ color: t.text, fontSize: '17px', fontWeight: 600, lineHeight: 1.5, fontFamily: `'${t.font}', sans-serif` }}>
            Vous : <span style={{ color: t.primary, fontVariantNumeric: 'tabular-nums' }}>{formatPct(step.prospectRate)}</span>
            <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
            Marché : {editingMarket ? (
              <input type="number" autoFocus value={marketDraft} onChange={e => setMarketDraft(e.target.value)} onBlur={() => { updateMarketOverride(Math.max(0, Math.min(100, +marketDraft))/100); setEditingMarket(false); }} onKeyDown={e => e.key === 'Enter' && e.target.blur()} style={{ width: '64px', padding: '0 4px', textAlign: 'center', fontVariantNumeric: 'tabular-nums', background: 'transparent', color: t.text, border: 'none', borderBottom: `2px solid ${t.primary}`, outline: 'none' }} />
            ) : (
              <span style={{ fontVariantNumeric: 'tabular-nums', cursor: 'pointer' }} onClick={() => { setMarketDraft(Math.round(step.marketRate*100)); setEditingMarket(true); }}>{formatPct(step.marketRate)} <span style={{ fontSize: '12px', opacity: 0.4 }}>✎</span></span>
            )}
            {step.atMarket
              ? <span style={{ marginLeft: '12px', color: t.success, fontSize: '14px', fontWeight: 600 }}>✓ Au niveau du marché</span>
              : <>
                  <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
                  <span style={{ color: t.danger, fontVariantNumeric: 'tabular-nums' }}>-{formatPct(step.delta)}</span>
                  <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
                  <span style={{ color: t.text, fontVariantNumeric: 'tabular-nums', fontWeight: 700 }}>-{formatEUR(step.loss)}{!isOneShot && '/mois'}</span>
                  {isOneShot && <span style={{ marginLeft: '8px', fontSize: '14px', color: t.mutedText, fontStyle: 'italic' }}>(one-shot)</span>}
                </>
            }
          </p>
          <p style={{ fontSize: '12px', color: t.mutedText, fontStyle: 'italic', marginTop: '8px' }}>
            ↳ Source : {source.name} <a href={source.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'underline', color: t.mutedText }}>[voir l'étude ↗]</a>
          </p>
          {editingCause ? (
            <textarea autoFocus defaultValue={cause} onBlur={(e) => { updateCause(e.target.value); setEditingCause(false); }} style={{ width: '100%', marginTop: '4px', padding: '4px 8px', fontSize: '13px', fontStyle: 'italic', color: t.danger, border: `1px solid ${dangerLight}`, borderRadius: t.radius, resize: 'none', background: t.bgAlt, fontFamily: `'${t.font}', sans-serif` }} rows={2} />
          ) : (
            <p style={{ fontSize: '13px', fontStyle: 'italic', marginTop: '4px', color: t.danger, cursor: 'pointer', padding: '2px 4px', borderRadius: t.radius }} onClick={() => setEditingCause(true)} title="Cliquer pour éditer">
              ↳ Cause : {cause}
            </p>
          )}
        </div>
      );
    };

    const TotalsBlock = ({ losses, t }) => {
      const ratio = losses.caActuel > 0 ? losses.monthly / losses.caActuel : 0;
      const actuelBarWidth = losses.caPotentielMensuel > 0 ? (losses.caActuel / losses.caPotentielMensuel) * 100 : 0;

      return (
        <div style={{ ...cardCSS(t), marginTop: t.sectionGap, borderTop: `4px solid ${t.primary}`, background: t.bgAlt }}>
          <div style={{ marginBottom: '28px', paddingBottom: '20px', borderBottom: `2px solid ${t.primaryLight}` }}>
            <p style={{ ...labelCSS(t), color: t.primary, margin: '0 0 4px 0' }}>Étape 03 · Synthèse chiffrée</p>
            <h2 style={{ ...titleCSS(t, 'h2'), margin: 0 }}>Ce que vous laissez sur la table</h2>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px', marginBottom: '40px' }}>
            <div style={{ padding: '24px', background: lightenHex(t.danger, 0.92), borderRadius: t.radius, borderLeft: `4px solid ${t.danger}` }}>
              <p style={{ ...labelCSS(t), color: t.danger, marginBottom: '12px' }}>Perte mensuelle récurrente</p>
              <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: t.sizes.big, color: t.danger, fontFamily: `'${t.font}', sans-serif`, letterSpacing: '-0.02em', lineHeight: 1 }}>-{formatEUR(losses.monthly)}<span style={{ fontSize: '16px', color: t.mutedText, fontWeight: 400 }}> /mois</span></p>
            </div>
            <div style={{ padding: '24px', background: t.primaryFaint, borderRadius: t.radius, borderLeft: `4px solid ${t.primary}` }}>
              <p style={{ ...labelCSS(t), color: t.primary, marginBottom: '12px' }}>One-shot devis dormants</p>
              <p style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontSize: t.sizes.h1, color: t.primary, fontFamily: `'${t.font}', sans-serif`, letterSpacing: '-0.02em', lineHeight: 1 }}>{formatEUR(losses.oneShot)}</p>
            </div>
          </div>

          <div style={{ paddingTop: '24px', borderTop: `1px solid ${t.primaryLight}` }}>
            <p style={{ ...labelCSS(t), color: t.primary, marginBottom: '20px' }}>CA actuel vs CA potentiel</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '6px' }}>
                  <span style={{ color: t.mutedText, fontWeight: 600 }}>Actuel</span>
                  <span style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: t.text, fontSize: '18px' }}>{formatEUR(losses.caActuel)}</span>
                </div>
                <div style={{ height: '36px', borderRadius: t.radius, background: t.primaryFaint, border: `1px solid ${t.primaryLight}`, overflow: 'hidden' }}>
                  <div style={{ height: '100%', borderRadius: t.radius, transition: 'width 0.7s ease', width: actuelBarWidth + '%', background: t.primary, opacity: 0.5 }} />
                </div>
              </div>
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '6px' }}>
                  <span style={{ fontWeight: 700, color: t.success, textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing, fontSize: '12px' }}>Potentiel</span>
                  <span style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', color: t.success, fontSize: '18px' }}>{formatEUR(losses.caPotentielMensuel)}</span>
                </div>
                <div style={{ height: '36px', borderRadius: t.radius, background: t.primaryFaint, border: `1px solid ${t.primaryLight}`, overflow: 'hidden' }}>
                  <div style={{ height: '100%', borderRadius: t.radius, transition: 'width 0.7s ease', width: '100%', background: `linear-gradient(90deg, ${t.primary} 0%, ${t.success} 100%)` }} />
                </div>
              </div>
            </div>
            <div style={{ marginTop: '48px', textAlign: 'center', padding: '32px 24px', background: lightenHex(t.danger, 0.94), borderRadius: t.radius, border: `2px solid ${lightenHex(t.danger, 0.7)}` }}>
              <p style={{ fontSize: '13px', color: t.danger, textTransform: 'uppercase', letterSpacing: t.labelLetterSpacing, marginBottom: '12px', fontWeight: 700 }}>Vous laissez sur la table chaque mois</p>
              <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: t.sizes.huge, color: t.danger, lineHeight: 1, letterSpacing: '-0.03em', fontFamily: `'${t.font}', sans-serif` }}>-{formatEUR(losses.monthly)}</p>
              {ratio > 0 && <p style={{ fontSize: '17px', color: t.text, marginTop: '12px', fontWeight: 500 }}>= <strong style={{ color: t.danger }}>{ratio.toFixed(2).replace('.', ',')}×</strong> votre CA actuel</p>}
            </div>
          </div>
        </div>
      );
    };

    const ThreeAxesBlock = ({ t }) => {
      const axes = [
        { num: '01', title: 'Réveiller votre base\nde devis dormants', desc: 'Quick win — un stock d\'anciens leads que vous pouvez réveiller en 30 jours' },
        { num: '02', title: 'Ne plus rien laisser fuir', desc: 'Capter chaque lead, traiter chaque devis, au bon moment' },
        { num: '03', title: 'Reprendre le contrôle\npar la donnée', desc: 'Voir en temps réel ce qui marche, ce qui fuit, où agir' },
      ];
      return (
        <div style={{ marginTop: t.sectionGap, paddingTop: t.sectionGap, ...separatorCSS(t, t.border) }}>
          <h2 style={{ ...titleCSS(t, 'h2'), textAlign: 'center', color: t.primary, marginBottom: '40px' }}>Comment récupérer cet argent — 3 axes</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '20px' }}>
            {axes.map((a, idx) => (
              <div key={a.num} className="fade-up" style={{ ...cardCSS(t), textAlign: 'center', animationDelay: `${idx * 100}ms` }}>
                <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: t.sizes.huge, color: t.primary, letterSpacing: '-0.02em', lineHeight: 1, fontFamily: `'${t.font}', sans-serif` }}>{a.num}</p>
                <div style={{ margin: '16px auto', width: '40px', height: '2px', background: t.primary }} />
                <p style={{ ...titleCSS(t, 'h2'), lineHeight: 1.5, whiteSpace: 'pre-line' }}>{a.title}</p>
                <p style={{ marginTop: '16px', fontSize: '14px', color: t.mutedText, lineHeight: 1.6 }}>{a.desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ============================================================
    // MODE GAINS
    // ============================================================

    const ModeGains = ({ session, scenario, setScenario, marketRates }) => {
      const gains = useMemo(() => calcGains(session.inputs, scenario, marketRates), [session.inputs, scenario, marketRates]);

      return (
        <div className="bg-noir min-h-screen text-white" style={{ fontFamily: "'Inter', sans-serif" }}>
          <div className="max-w-5xl mx-auto px-10 py-12">
            {/* Header */}
            <div className="flex items-start justify-between pb-8 border-b border-or/20">
              <div className="logo-scalia" style={{ fontSize: '36px' }}>
                <span className="scalia">SCALIA</span>
                <span className="rule"></span>
                <span className="btp">BTP</span>
              </div>
              <div className="text-right">
                <p className="font-serif uppercase text-or text-sm" style={{ letterSpacing: '0.18em' }}>Projection ROI Pilot</p>
                <p className="text-or/70 text-sm mt-1">Pour {session.companyName}</p>
              </div>
            </div>

            {/* Scenario buttons */}
            <ScenarioButtons scenario={scenario} setScenario={setScenario} />

            {/* Big number */}
            <BigGainBlock gains={gains} />

            {/* CA actuel vs potentiel */}
            <CABlockGains gains={gains} />

            {/* ROI block */}
            <ROIBlock gains={gains} />

            {/* Footer */}
            <div className="mt-16 pt-8 border-t border-or/20 text-center">
              <p className="font-serif text-or/70" style={{ fontSize: '14px', letterSpacing: '0.5em' }}>SCALIA · BTP</p>
            </div>
          </div>
        </div>
      );
    };

    const ScenarioButtons = ({ scenario, setScenario }) => {
      const scenarios = [
        { key: 'pessimiste', label: 'Pessimiste', sub: 'Hypothèse minimale garantie' },
        { key: 'neutre', label: 'Neutre', sub: 'Vous atteignez la médiane du marché' },
        { key: 'optimiste', label: 'Optimiste', sub: 'Vous atteignez le haut du marché' },
      ];
      return (
        <div className="mt-10 flex gap-2 p-1.5 rounded-full border border-or/30 bg-white/[0.03] max-w-2xl mx-auto">
          {scenarios.map(s => {
            const active = s.key === scenario;
            return (
              <button
                key={s.key}
                onClick={() => setScenario(s.key)}
                className={`flex-1 px-5 py-3 rounded-full transition ${active ? 'bg-or text-noir' : 'text-white/50 hover:text-white/85'}`}
              >
                <p className="font-semibold uppercase text-xs" style={{ letterSpacing: '0.18em' }}>{s.label}</p>
                <p className={`text-[10px] mt-0.5 ${active ? 'text-noir/70' : 'text-white/50'} leading-tight`}>{s.sub}</p>
              </button>
            );
          })}
        </div>
      );
    };

    const BigGainBlock = ({ gains }) => {
      const animated = useCountUp(gains.total12mo);
      return (
        <div className="mt-16 text-center">
          <p className="font-serif uppercase text-or" style={{ fontSize: '13px', letterSpacing: '0.3em' }}>Avec ROI Pilot, vous récupérez</p>
          <div className="mt-6 flex items-baseline justify-center">
            <span className="font-extrabold tabular text-or" style={{ fontSize: 'clamp(80px, 12vw, 140px)', letterSpacing: '-0.03em', lineHeight: 1 }}>{formatNumber(animated)}</span>
            <span className="text-or/70 ml-2" style={{ fontSize: 'clamp(40px, 5vw, 60px)' }}>€</span>
          </div>
          <p className="mt-4 text-white/85" style={{ fontSize: '18px', letterSpacing: '0.1em' }}>sur 12 mois</p>
        </div>
      );
    };

    const CABlockGains = ({ gains }) => {
      const diff = gains.caPotentielMensuel - gains.caActuel;
      const ratio = gains.caActuel > 0 ? gains.caPotentielMensuel / gains.caActuel : 0;
      return (
        <div className="mt-16 pt-10 border-t border-or/20">
          <p className="font-serif text-center text-or/70 uppercase" style={{ fontSize: '13px', letterSpacing: '0.25em' }}>Votre CA mensuel</p>
          <div className="mt-8 grid grid-cols-2 gap-4">
            <div className="text-center p-8 rounded border border-white/10 bg-white/[0.02]">
              <p className="text-white/40 text-xs uppercase tracking-wider mb-3">Actuel</p>
              <p className="font-bold tabular text-white/60" style={{ fontSize: '40px' }}>{formatEUR(gains.caActuel)}</p>
              <p className="text-white/40 text-sm mt-1">/mois</p>
            </div>
            <div className="text-center p-8 rounded border border-or/40 bg-or/5">
              <p className="font-serif uppercase text-or text-xs mb-3" style={{ letterSpacing: '0.2em' }}>Potentiel</p>
              <p className="font-extrabold tabular text-or" style={{ fontSize: '56px', letterSpacing: '-0.02em' }}>{formatEUR(gains.caPotentielMensuel)}</p>
              <p className="text-or/70 text-sm mt-1">/mois</p>
            </div>
          </div>
          {diff > 0 && (
            <p className="mt-6 text-center text-white/85" style={{ fontSize: '16px' }}>
              → Différence : <span className="text-or font-semibold">+{formatEUR(diff)}/mois</span>
              {ratio > 1 && <span> (×{ratio.toFixed(2).replace('.', ',')})</span>}
            </p>
          )}
        </div>
      );
    };

    const ROIBlock = ({ gains }) => {
      const breakEven = gains.breakEvenMonth;
      return (
        <div className="mt-12 grid grid-cols-3 gap-4">
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">Investissement</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>{formatEUR(INVESTMENT)}</p>
            <p className="text-white/70 text-xs mt-1">Tout compris</p>
          </div>
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">Seuil rentabilité</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>{breakEven ? `Mois ${breakEven}` : '—'}</p>
            <p className="text-white/70 text-xs mt-1">Quick win</p>
          </div>
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">ROI 12 mois</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>× {gains.roiMultiplier || 0}</p>
            <p className="text-white/70 text-xs mt-1">Multiplicateur</p>
          </div>
        </div>
      );
    };

    // Counter animation hook
    const useCountUp = (target, duration = 700) => {
      const [val, setVal] = useState(0);
      const prev = useRef(0);
      useEffect(() => {
        const start = prev.current;
        const end = target;
        const startTime = performance.now();
        let raf;
        const tick = (now) => {
          const t = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
          setVal(start + (end - start) * eased);
          if (t < 1) raf = requestAnimationFrame(tick);
          else prev.current = end;
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [target]);
      return val;
    };

    // ============================================================
    // HOME (redirect)
    // ============================================================

    const HomePage = () => {
      useEffect(() => {
        navigate('/admin');
      }, []);
      return null;
    };

    // ============================================================
    // APP ROOT
    // ============================================================

    const App = () => {
      const route = useHashRoute();
      return (
        <AppProvider>
          {route.name === 'home' && <HomePage />}
          {route.name === 'admin' && <AdminPage />}
          {route.name === 'session' && <SessionPage slug={route.slug} />}
        </AppProvider>
      );
    };

      createRoot(document.getElementById('root')).render(<App />);
    })();
  </script>
</body>
</html>
