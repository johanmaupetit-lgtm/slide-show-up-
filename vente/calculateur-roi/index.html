            )}

            {/* 3 axes */}
            {expanded && allFilled && <ThreeAxesBlock t={t} />}
          </div>
        </div>
      );
    };

    const InputsPanel = ({ session, updateInputs, t }) => {
      const Input = ({ k, label, suffix = '' }) => (
        <div>
          <label style={{ display: 'block', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: t.mutedText, marginBottom: '4px' }}>{label}</label>
          <div style={{ position: 'relative' }}>
            <input
              type="number"
              value={session.inputs[k] ?? ''}
              onChange={e => updateInputs({ [k]: e.target.value })}
              placeholder="0"
              style={{
                width: '100%',
                background: t.bgAlt,
                border: `1.5px solid ${t.primaryLight}`,
                borderRadius: t.radius,
                padding: '10px 12px',
                fontSize: '16px',
                fontWeight: 600,
                color: t.text,
                fontVariantNumeric: 'tabular-nums',
                fontFamily: `'${t.font}', sans-serif`,
                outline: 'none',
                transition: 'border-color 0.15s',
              }}
              onFocus={e => e.target.style.borderColor = t.primary}
              onBlur={e => e.target.style.borderColor = t.primaryLight}
            />
            {suffix && <span style={{ position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)', color: t.mutedText, fontSize: '13px' }}>{suffix}</span>}
          </div>
        </div>
      );
      return (
        <div style={{ marginBottom: t.sectionGap, display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '12px' }}>
          <Input k="leadsRecus" label="Leads reçus/mois" />
          <Input k="leadsTraites" label="Leads traités" />
          <Input k="rdvPris" label="RDV pris" />
          <Input k="rdvHonores" label="RDV honorés" />
          <Input k="signatures" label="Signatures" />
          <Input k="ticket" label="Ticket €" suffix="€" />
          <Input k="devisDormants" label="Devis dormants" />
        </div>
      );
    };

    const ActivityBlock = ({ session, losses, expanded, setExpanded, t }) => {
      const i = session.inputs;
      const Row = ({ label, value, isTotal = false }) => (
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid rgba(0,0,0,0.05)' }}>
          <span style={{ color: isTotal ? t.text : t.mutedText, fontSize: isTotal ? '15px' : '14px', fontWeight: isTotal ? 600 : 400 }}>{label}</span>
          <span style={{ color: isTotal ? t.primary : t.text, fontSize: isTotal ? '24px' : '16px', fontWeight: isTotal ? 700 : 600, fontVariantNumeric: 'tabular-nums', fontFamily: `'${t.font}', sans-serif` }}>{value}</span>
        </div>
      );
      return (
        <div style={cardCSS(t)}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
            <h2 style={{ ...titleCSS(t), fontSize: '16px', margin: 0 }}>Votre activité commerciale</h2>
            <button
              onClick={() => setExpanded(e => !e)}
              style={{ width: '44px', height: '44px', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: t.bgAlt, fontWeight: 'bold', background: t.primary, border: 'none', cursor: 'pointer', fontSize: '18px', transition: 'transform 0.15s' }}
              onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.08)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
              title="Comparer au marché"
            >
              {expanded ? '↙' : '↗'}
            </button>
          </div>
          <div>
            <Row label="Leads reçus / mois" value={formatNumber(+i.leadsRecus)} />
            <Row label="Leads traités" value={formatNumber(+i.leadsTraites)} />
            <Row label="RDV pris" value={formatNumber(+i.rdvPris)} />
            <Row label="RDV honorés" value={formatNumber(+i.rdvHonores)} />
            <Row label="Signatures" value={formatNumber(+i.signatures)} />
            <Row label="Ticket moyen" value={formatEUR(+i.ticket)} />
            <Row label="Devis dormants" value={formatNumber(+i.devisDormants)} />
          </div>
          <div style={{ marginTop: '20px', paddingTop: '20px', borderTop: `2px solid ${t.primaryLight}` }}>
            <Row label="CA actuel" value={`${formatEUR(losses.caActuel)} /mois`} isTotal />
          </div>
        </div>
      );
    };

    const ComparisonBlock = ({ losses, session, updateCauses, updateMarketOverride, marketRates, t }) => {
      const stepsOrder = ['leadTraite', 'leadRdv', 'rdvHonore', 'devisSignature'];
      return (
        <div style={{ ...cardCSS(t), marginTop: '24px' }}>
          <h2 style={{ ...titleCSS(t), fontSize: '16px', margin: '0 0 24px 0' }}>Comparaison avec le marché</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
            {stepsOrder.map(key => (
              <ComparisonRow key={key} stepKey={key} step={losses.steps[key]} cause={session.causes[key]} updateCause={(v) => updateCauses({ [key]: v })} updateMarketOverride={(v) => updateMarketOverride(key, v)} t={t} />
            ))}
          </div>
          <div style={{ marginTop: '32px', paddingTop: '32px', borderTop: `1px solid ${t.primaryLight}` }}>
            <ComparisonRow stepKey="devisDormants" step={losses.steps.devisDormants} cause={session.causes.devisDormants} updateCause={(v) => updateCauses({ devisDormants: v })} updateMarketOverride={(v) => updateMarketOverride('devisDormants', v)} t={t} isOneShot />
          </div>
        </div>
      );
    };

    const ComparisonRow = ({ stepKey, step, cause, updateCause, updateMarketOverride, t, isOneShot }) => {
      const [editingCause, setEditingCause] = useState(false);
      const [editingMarket, setEditingMarket] = useState(false);
      const [marketDraft, setMarketDraft] = useState(Math.round(step.marketRate * 100));
      const source = SOURCES[stepKey];

      return (
        <div style={{ paddingLeft: '16px', borderLeft: `3px solid ${t.primary}` }}>
          <p style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.08em', color: t.mutedText, marginBottom: '4px' }}>{STEP_LABELS[stepKey]}</p>
          <p style={{ color: t.text, fontSize: '17px', fontWeight: 600, lineHeight: 1.5, fontFamily: `'${t.font}', sans-serif` }}>
            Vous : <span style={{ color: t.primary, fontVariantNumeric: 'tabular-nums' }}>{formatPct(step.prospectRate)}</span>
            <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
            Marché : {editingMarket ? (
              <input type="number" autoFocus value={marketDraft} onChange={e => setMarketDraft(e.target.value)} onBlur={() => { updateMarketOverride(Math.max(0, Math.min(100, +marketDraft))/100); setEditingMarket(false); }} onKeyDown={e => e.key === 'Enter' && e.target.blur()} style={{ width: '64px', borderBottom: `2px solid ${t.primary}`, padding: '0 4px', textAlign: 'center', fontVariantNumeric: 'tabular-nums', background: 'transparent', color: t.text, border: 'none', borderBottom: `2px solid ${t.primary}`, outline: 'none' }} />
            ) : (
              <span style={{ fontVariantNumeric: 'tabular-nums', cursor: 'pointer' }} onClick={() => { setMarketDraft(Math.round(step.marketRate*100)); setEditingMarket(true); }}>{formatPct(step.marketRate)} <span style={{ fontSize: '12px', opacity: 0.4 }}>✎</span></span>
            )}
            {step.atMarket
              ? <span style={{ marginLeft: '12px', color: '#3A8A3A', fontSize: '14px', fontWeight: 600 }}>✓ Au niveau du marché</span>
              : <>
                  <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
                  <span style={{ color: '#8B1A1A', fontVariantNumeric: 'tabular-nums' }}>-{formatPct(step.delta)}</span>
                  <span style={{ color: t.mutedText, margin: '0 8px' }}>→</span>
                  <span style={{ color: t.text, fontVariantNumeric: 'tabular-nums', fontWeight: 700 }}>-{formatEUR(step.loss)}{!isOneShot && '/mois'}</span>
                  {isOneShot && <span style={{ marginLeft: '8px', fontSize: '14px', color: t.mutedText, fontStyle: 'italic' }}>(one-shot)</span>}
                </>
            }
          </p>
          <p style={{ fontSize: '12px', color: t.mutedText, fontStyle: 'italic', marginTop: '8px' }}>
            ↳ Source : {source.name} <a href={source.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'underline', color: t.mutedText }}>[voir l'étude ↗]</a>
          </p>
          {editingCause ? (
            <textarea autoFocus defaultValue={cause} onBlur={(e) => { updateCause(e.target.value); setEditingCause(false); }} style={{ width: '100%', marginTop: '4px', padding: '4px 8px', fontSize: '13px', fontStyle: 'italic', color: '#8B1A1A', border: '1px solid rgba(139,26,26,0.3)', borderRadius: t.radius, resize: 'none', background: t.bgAlt, fontFamily: `'${t.font}', sans-serif` }} rows={2} />
          ) : (
            <p style={{ fontSize: '13px', fontStyle: 'italic', marginTop: '4px', color: '#8B1A1A', cursor: 'pointer', padding: '2px 4px', borderRadius: t.radius }} onClick={() => setEditingCause(true)} title="Cliquer pour éditer">
              ↳ Cause : {cause}
            </p>
          )}
        </div>
      );
    };

    const TotalsBlock = ({ losses, t }) => {
      const ratio = losses.caActuel > 0 ? losses.monthly / losses.caActuel : 0;
      const actuelBarWidth = losses.caPotentielMensuel > 0 ? (losses.caActuel / losses.caPotentielMensuel) * 100 : 0;

      return (
        <div style={{ ...cardCSS(t), marginTop: t.sectionGap }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '32px', marginBottom: '32px' }}>
            <div>
              <p style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.1em', color: t.mutedText, marginBottom: '8px' }}>Perte mensuelle récurrente</p>
              <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: '40px', color: t.primary, fontFamily: `'${t.font}', sans-serif`, letterSpacing: '-0.02em', lineHeight: 1 }}>{formatEUR(losses.monthly)}<span style={{ fontSize: '16px', color: t.mutedText, fontWeight: 400 }}> /mois</span></p>
            </div>
            <div>
              <p style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.1em', color: t.mutedText, marginBottom: '8px' }}>One-shot devis dormants</p>
              <p style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', fontSize: '30px', color: t.text, fontFamily: `'${t.font}', sans-serif`, letterSpacing: '-0.02em', lineHeight: 1 }}>{formatEUR(losses.oneShot)}</p>
            </div>
          </div>

          <div style={{ paddingTop: '24px', borderTop: `1px solid ${t.primaryLight}` }}>
            <p style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.22em', color: t.mutedText, marginBottom: '16px' }}>CA actuel vs CA potentiel</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '4px' }}>
                  <span style={{ color: t.mutedText }}>Actuel</span>
                  <span style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: t.text }}>{formatEUR(losses.caActuel)}</span>
                </div>
                <div style={{ height: '32px', borderRadius: t.radius, background: t.bg, border: `1px solid ${t.primaryLight}` }}>
                  <div style={{ height: '100%', borderRadius: t.radius, transition: 'width 0.7s ease', width: actuelBarWidth + '%', background: t.primary, opacity: 0.4 }} />
                </div>
              </div>
              <div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', marginBottom: '4px' }}>
                  <span style={{ fontWeight: 600, color: t.primary }}>Potentiel</span>
                  <span style={{ fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: t.primary }}>{formatEUR(losses.caPotentielMensuel)}</span>
                </div>
                <div style={{ height: '32px', borderRadius: t.radius, background: t.bg, border: `1px solid ${t.primaryLight}` }}>
                  <div style={{ height: '100%', borderRadius: t.radius, transition: 'width 0.7s ease', width: '100%', background: t.primary }} />
                </div>
              </div>
            </div>
            <div style={{ marginTop: '32px', textAlign: 'center' }}>
              <p style={{ fontSize: '13px', color: t.mutedText, textTransform: 'uppercase', letterSpacing: '0.15em', marginBottom: '8px' }}>Vous laissez sur la table chaque mois</p>
              <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: '64px', color: t.primary, lineHeight: 1, letterSpacing: '-0.03em', fontFamily: `'${t.font}', sans-serif` }}>{formatEUR(losses.monthly)}</p>
              {ratio > 0 && <p style={{ fontSize: '16px', color: t.mutedText, marginTop: '8px' }}>= {ratio.toFixed(2).replace('.', ',')}× votre CA actuel</p>}
            </div>
          </div>
        </div>
      );
    };

    const ThreeAxesBlock = ({ t }) => {
      const axes = [
        { num: '01', title: 'Réveiller votre base\nde devis dormants', desc: 'Quick win — un stock d\'anciens leads que vous pouvez réveiller en 30 jours' },
        { num: '02', title: 'Ne plus rien laisser fuir', desc: 'Capter chaque lead, traiter chaque devis, au bon moment' },
        { num: '03', title: 'Reprendre le contrôle\npar la donnée', desc: 'Voir en temps réel ce qui marche, ce qui fuit, où agir' },
      ];
      return (
        <div style={{ marginTop: t.sectionGap, paddingTop: t.sectionGap, borderTop: `1px solid ${t.primaryLight}` }}>
          <h2 style={{ ...titleCSS(t), textAlign: 'center', fontSize: '18px', color: t.primary, marginBottom: '40px' }}>Comment récupérer cet argent — 3 axes</h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '20px' }}>
            {axes.map((a, idx) => (
              <div key={a.num} className="fade-up" style={{ ...cardCSS(t), textAlign: 'center', animationDelay: `${idx * 100}ms` }}>
                <p style={{ fontWeight: 800, fontVariantNumeric: 'tabular-nums', fontSize: '64px', color: t.primary, letterSpacing: '-0.02em', lineHeight: 1, fontFamily: `'${t.font}', sans-serif` }}>{a.num}</p>
                <div style={{ margin: '16px auto', width: '40px', height: '2px', background: t.primary }} />
                <p style={{ ...titleCSS(t), fontSize: '14px', lineHeight: 1.5, whiteSpace: 'pre-line', color: t.text }}>{a.title}</p>
                <p style={{ marginTop: '16px', fontSize: '14px', color: t.mutedText, lineHeight: 1.6 }}>{a.desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ============================================================
    // MODE GAINS
    // ============================================================

    const ModeGains = ({ session, scenario, setScenario, marketRates }) => {
      const gains = useMemo(() => calcGains(session.inputs, scenario, marketRates), [session.inputs, scenario, marketRates]);

      return (
        <div className="bg-noir min-h-screen text-white" style={{ fontFamily: "'Inter', sans-serif" }}>
          <div className="max-w-5xl mx-auto px-10 py-12">
            {/* Header */}
            <div className="flex items-start justify-between pb-8 border-b border-or/20">
              <div className="logo-scalia" style={{ fontSize: '36px' }}>
                <span className="scalia">SCALIA</span>
                <span className="rule"></span>
                <span className="btp">BTP</span>
              </div>
              <div className="text-right">
                <p className="font-serif uppercase text-or text-sm" style={{ letterSpacing: '0.18em' }}>Projection ROI Pilot</p>
                <p className="text-or/70 text-sm mt-1">Pour {session.companyName}</p>
              </div>
            </div>

            {/* Scenario buttons */}
            <ScenarioButtons scenario={scenario} setScenario={setScenario} />

            {/* Big number */}
            <BigGainBlock gains={gains} />

            {/* CA actuel vs potentiel */}
            <CABlockGains gains={gains} />

            {/* ROI block */}
            <ROIBlock gains={gains} />

            {/* Footer */}
            <div className="mt-16 pt-8 border-t border-or/20 text-center">
              <p className="font-serif text-or/70" style={{ fontSize: '14px', letterSpacing: '0.5em' }}>SCALIA · BTP</p>
            </div>
          </div>
        </div>
      );
    };

    const ScenarioButtons = ({ scenario, setScenario }) => {
      const scenarios = [
        { key: 'pessimiste', label: 'Pessimiste', sub: 'Hypothèse minimale garantie' },
        { key: 'neutre', label: 'Neutre', sub: 'Vous atteignez la médiane du marché' },
        { key: 'optimiste', label: 'Optimiste', sub: 'Vous atteignez le haut du marché' },
      ];
      return (
        <div className="mt-10 flex gap-2 p-1.5 rounded-full border border-or/30 bg-white/[0.03] max-w-2xl mx-auto">
          {scenarios.map(s => {
            const active = s.key === scenario;
            return (
              <button
                key={s.key}
                onClick={() => setScenario(s.key)}
                className={`flex-1 px-5 py-3 rounded-full transition ${active ? 'bg-or text-noir' : 'text-white/50 hover:text-white/85'}`}
              >
                <p className="font-semibold uppercase text-xs" style={{ letterSpacing: '0.18em' }}>{s.label}</p>
                <p className={`text-[10px] mt-0.5 ${active ? 'text-noir/70' : 'text-white/50'} leading-tight`}>{s.sub}</p>
              </button>
            );
          })}
        </div>
      );
    };

    const BigGainBlock = ({ gains }) => {
      const animated = useCountUp(gains.total12mo);
      return (
        <div className="mt-16 text-center">
          <p className="font-serif uppercase text-or" style={{ fontSize: '13px', letterSpacing: '0.3em' }}>Avec ROI Pilot, vous récupérez</p>
          <div className="mt-6 flex items-baseline justify-center">
            <span className="font-extrabold tabular text-or" style={{ fontSize: 'clamp(80px, 12vw, 140px)', letterSpacing: '-0.03em', lineHeight: 1 }}>{formatNumber(animated)}</span>
            <span className="text-or/70 ml-2" style={{ fontSize: 'clamp(40px, 5vw, 60px)' }}>€</span>
          </div>
          <p className="mt-4 text-white/85" style={{ fontSize: '18px', letterSpacing: '0.1em' }}>sur 12 mois</p>
        </div>
      );
    };

    const CABlockGains = ({ gains }) => {
      const diff = gains.caPotentielMensuel - gains.caActuel;
      const ratio = gains.caActuel > 0 ? gains.caPotentielMensuel / gains.caActuel : 0;
      return (
        <div className="mt-16 pt-10 border-t border-or/20">
          <p className="font-serif text-center text-or/70 uppercase" style={{ fontSize: '13px', letterSpacing: '0.25em' }}>Votre CA mensuel</p>
          <div className="mt-8 grid grid-cols-2 gap-4">
            <div className="text-center p-8 rounded border border-white/10 bg-white/[0.02]">
              <p className="text-white/40 text-xs uppercase tracking-wider mb-3">Actuel</p>
              <p className="font-bold tabular text-white/60" style={{ fontSize: '40px' }}>{formatEUR(gains.caActuel)}</p>
              <p className="text-white/40 text-sm mt-1">/mois</p>
            </div>
            <div className="text-center p-8 rounded border border-or/40 bg-or/5">
              <p className="font-serif uppercase text-or text-xs mb-3" style={{ letterSpacing: '0.2em' }}>Potentiel</p>
              <p className="font-extrabold tabular text-or" style={{ fontSize: '56px', letterSpacing: '-0.02em' }}>{formatEUR(gains.caPotentielMensuel)}</p>
              <p className="text-or/70 text-sm mt-1">/mois</p>
            </div>
          </div>
          {diff > 0 && (
            <p className="mt-6 text-center text-white/85" style={{ fontSize: '16px' }}>
              → Différence : <span className="text-or font-semibold">+{formatEUR(diff)}/mois</span>
              {ratio > 1 && <span> (×{ratio.toFixed(2).replace('.', ',')})</span>}
            </p>
          )}
        </div>
      );
    };

    const ROIBlock = ({ gains }) => {
      const breakEven = gains.breakEvenMonth;
      return (
        <div className="mt-12 grid grid-cols-3 gap-4">
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">Investissement</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>{formatEUR(INVESTMENT)}</p>
            <p className="text-white/70 text-xs mt-1">Tout compris</p>
          </div>
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">Seuil rentabilité</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>{breakEven ? `Mois ${breakEven}` : '—'}</p>
            <p className="text-white/70 text-xs mt-1">Quick win</p>
          </div>
          <div className="p-6 rounded border border-or/30 bg-white/[0.03]">
            <p className="text-white/50 text-[11px] uppercase tracking-widest mb-2">ROI 12 mois</p>
            <p className="font-extrabold tabular text-or" style={{ fontSize: '32px' }}>× {gains.roiMultiplier || 0}</p>
            <p className="text-white/70 text-xs mt-1">Multiplicateur</p>
          </div>
        </div>
      );
    };

    // Counter animation hook
    const useCountUp = (target, duration = 700) => {
      const [val, setVal] = useState(0);
      const prev = useRef(0);
      useEffect(() => {
        const start = prev.current;
        const end = target;
        const startTime = performance.now();
        let raf;
        const tick = (now) => {
          const t = Math.min(1, (now - startTime) / duration);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
          setVal(start + (end - start) * eased);
          if (t < 1) raf = requestAnimationFrame(tick);
          else prev.current = end;
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [target]);
      return val;
    };

    // ============================================================
    // HOME (redirect)
    // ============================================================

    const HomePage = () => {
      useEffect(() => {
        navigate('/admin');
      }, []);
      return null;
    };

    // ============================================================
    // APP ROOT
    // ============================================================

    const App = () => {
      const route = useHashRoute();
      return (
        <AppProvider>
          {route.name === 'home' && <HomePage />}
          {route.name === 'admin' && <AdminPage />}
          {route.name === 'session' && <SessionPage slug={route.slug} />}
        </AppProvider>
      );
    };

      createRoot(document.getElementById('root')).render(<App />);
    })();
  </script>
</body>
</html>
