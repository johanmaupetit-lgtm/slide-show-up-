  <script type="module">
    import React, { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } from 'react';
    import { createRoot } from 'react-dom/client';
    window.React = React;
    window.ReactHooks = { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext };

  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    (async function bootApp() {
      // ATTENTE DU CHARGEMENT REACT
      await new Promise(resolve => {
        if (window.React) return resolve();
        window.addEventListener('react-ready', resolve, { once: true });
      });

      const React = window.React;
      const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = window.ReactHooks;
      const createRoot = window.createRoot;

    // ============================================================
    // CONSTANTES — TAUX MARCHÉ + SOURCES
    // ============================================================

    const MARKET_RATES_DEFAULT = {
      leadTraite: 1.00,       // MIT Oldroyd 2011 — 100% en <5min
      leadRdv: 0.35,          // Edilead 2024 — 35% lead → RDV
      rdvHonore: 0.95,        // DETECTOUR — 95%
      devisSignature: 0.43,   // ELCIA 2025 + Yumens — 43%
      devisDormants: 0.04,    // Pharow 2024 — 4%
    };

    const SCENARIO_RATES = {
      pessimiste: { leadTraite: 1.0, leadRdv: null, rdvHonore: null, devisSignature: null, devisDormants: 0.02 },
      neutre:     { leadTraite: 1.0, leadRdv: 0.25, rdvHonore: 0.86, devisSignature: 0.33, devisDormants: 0.03 },
      optimiste:  { leadTraite: 1.0, leadRdv: 0.35, rdvHonore: 0.95, devisSignature: 0.43, devisDormants: 0.04 },
    };

    const SOURCES = {
      leadTraite: { name: 'MIT Oldroyd 2011', url: '[URL_MIT_OLDROYD]' },
      leadRdv: { name: 'Edilead 2024', url: '[URL_EDILEAD]' },
      rdvHonore: { name: 'DETECTOUR', url: '[URL_DETECTOUR]' },
      devisSignature: { name: 'ELCIA 2025 + Yumens', url: '[URL_ELCIA_2025]' },
      devisDormants: { name: 'Pharow 2024', url: '[URL_PHAROW_2024]' },
    };

    const DEFAULT_CAUSES = {
      leadTraite: "Pas de rappel automatique <5min, équipes saturées sur les chantiers",
      leadRdv: "Pas de script de qualification structuré, leads peu requalifiés",
      rdvHonore: "Pas de séquence anti no-show (mail J-2, SMS J-1, confirmation J-2h)",
      devisSignature: "Aucune relance structurée, devis envoyés trop tard, pas de scoring d'intérêt",
      devisDormants: "Aucune réactivation, base oubliée, devis perdus dans le CRM",
    };

    const STEP_LABELS = {
      leadTraite: 'Lead → traité',
      leadRdv: 'Lead → RDV pris',
      rdvHonore: 'RDV → honoré',
      devisSignature: 'Devis → signature',
      devisDormants: 'Devis dormants',
    };

    const GOOGLE_FONTS = [
      'Inter', 'Roboto', 'Open Sans', 'Lato', 'Montserrat', 'Poppins',
      'Raleway', 'Source Sans Pro', 'Oswald', 'Roboto Slab', 'Playfair Display',
      'Merriweather', 'PT Sans', 'Nunito', 'Mulish', 'Work Sans', 'Manrope',
      'Cinzel', 'Bebas Neue', 'Anton', 'Archivo', 'Barlow', 'DM Sans',
      'Fira Sans', 'Hind', 'Karla', 'Libre Baskerville', 'Libre Franklin',
      'Noto Sans', 'PT Serif', 'Quicksand', 'Rubik', 'Source Serif Pro',
      'Tinos', 'Ubuntu', 'Roboto Condensed', 'Crimson Text', 'Lora',
    ];

    const ADMIN_PASSWORD = 'scalia2026';
    const STORAGE_KEY = 'scalia-roi-app-state';
    const INVESTMENT = 16000;

    // ============================================================
    // UTILS
    // ============================================================

    const formatEUR = (n) => {
      if (n == null || isNaN(n)) return '—';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' €';
    };
    const formatPct = (n) => {
      if (n == null || isNaN(n)) return '—';
      return Math.round(n * 100) + ' %';
    };
    const formatNumber = (n) => {
      if (n == null || isNaN(n)) return '—';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(Math.round(n));
    };
    const slugify = (s) => s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    const dateSlug = (d) => {
      const date = new Date(d);
      const months = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
      return date.getDate() + months[date.getMonth()];
    };
    const lightenHex = (hex, amount = 0.85) => {
      // amount > 0 : mix with white (lighten). amount < 0 : mix with black (darken).
      const h = (hex || '#000000').replace('#','');
      const r = parseInt(h.substring(0,2),16);
      const g = parseInt(h.substring(2,4),16);
      const b = parseInt(h.substring(4,6),16);
      let nr, ng, nb;
      if (amount >= 0) {
        nr = Math.round(r + (255-r)*amount);
        ng = Math.round(g + (255-g)*amount);
        nb = Math.round(b + (255-b)*amount);
      } else {
        const k = 1 + amount; // amount in [-1,0] → k in [0,1]
        nr = Math.round(r * k);
        ng = Math.round(g * k);
        nb = Math.round(b * k);
      }
      const clamp = (x) => Math.max(0, Math.min(255, x));
      return '#' + [clamp(nr), clamp(ng), clamp(nb)].map(x => x.toString(16).padStart(2,'0')).join('');
    };

    // ============================================================
    // STORAGE
    // ============================================================

    const loadState = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { sessions: [] };
      } catch { return { sessions: [] }; }
    };
    const saveState = (state) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { console.error('Save failed', e); }
    };

    // ============================================================
    // CALCULATIONS
    // ============================================================

    const calcProspectRates = (inputs) => {
      const leadsRecus = +inputs.leadsRecus || 0;
      const leadsTraites = +inputs.leadsTraites || 0;
      const rdvPris = +inputs.rdvPris || 0;
      const rdvHonores = +inputs.rdvHonores || 0;
      const signatures = +inputs.signatures || 0;

      return {
        leadTraite: leadsRecus > 0 ? leadsTraites / leadsRecus : 0,
        leadRdv: leadsTraites > 0 ? rdvPris / leadsTraites : 0,
        rdvHonore: rdvPris > 0 ? rdvHonores / rdvPris : 0,
        devisSignature: rdvHonores > 0 ? signatures / rdvHonores : 0,
      };
    };

    const calcLosses = (inputs, marketRates) => {
      const p = calcProspectRates(inputs);
      const leadsRecus = +inputs.leadsRecus || 0;
      const ticket = +inputs.ticket || 0;
      const devisDormants = +inputs.devisDormants || 0;
      const m = marketRates;

      // Pertes par étape : calcul cascadé sur le funnel
      // Pour chaque étape, on calcule combien de signatures supplémentaires on ferait
      // si on avait le taux marché à cette étape (taux prospects ailleurs).

      const baseSignatures = leadsRecus * p.leadTraite * p.leadRdv * p.rdvHonore * p.devisSignature;

      const calcStepLoss = (stepKey) => {
        const rates = { ...p };
        // Override only this step with market
        rates[stepKey] = m[stepKey];
        // Ceiling : if prospect already at or above market, no loss
        if (p[stepKey] >= m[stepKey]) return { loss: 0, delta: 0, atMarket: true };
        const newSigs = leadsRecus * rates.leadTraite * rates.leadRdv * rates.rdvHonore * rates.devisSignature;
        const extraSigs = newSigs - baseSignatures;
        return { loss: extraSigs * ticket, delta: m[stepKey] - p[stepKey], atMarket: false };
      };

      const lossLeadTraite = calcStepLoss('leadTraite');
      const lossLeadRdv = calcStepLoss('leadRdv');
      const lossRdvHonore = calcStepLoss('rdvHonore');
      const lossDevisSignature = calcStepLoss('devisSignature');

      // Devis dormants — one-shot (taux de conversion réactivation = 0.33, médian ELCIA)
      const REACTIVATION_SIGNATURE_RATE = 0.33;
      const lossDormants = devisDormants * m.devisDormants * REACTIVATION_SIGNATURE_RATE * ticket;

      const monthly = lossLeadTraite.loss + lossLeadRdv.loss + lossRdvHonore.loss + lossDevisSignature.loss;
      const annual = monthly * 12;
      const caActuel = baseSignatures * ticket;
      const caPotentielMensuel = caActuel + monthly;

      return {
        prospectRates: p,
        baseSignatures,
        steps: {
          leadTraite: { ...lossLeadTraite, prospectRate: p.leadTraite, marketRate: m.leadTraite },
          leadRdv: { ...lossLeadRdv, prospectRate: p.leadRdv, marketRate: m.leadRdv },
          rdvHonore: { ...lossRdvHonore, prospectRate: p.rdvHonore, marketRate: m.rdvHonore },
          devisSignature: { ...lossDevisSignature, prospectRate: p.devisSignature, marketRate: m.devisSignature },
          devisDormants: { loss: lossDormants, prospectRate: 0, marketRate: m.devisDormants, atMarket: false },
        },
        monthly,
        annual,
        oneShot: lossDormants,
        caActuel,
        caPotentielMensuel,
      };
    };

    const calcGains = (inputs, scenarioKey, marketRates) => {
      const p = calcProspectRates(inputs);
      const sc = SCENARIO_RATES[scenarioKey];
      const leadsRecus = +inputs.leadsRecus || 0;
      const ticket = +inputs.ticket || 0;
      const devisDormants = +inputs.devisDormants || 0;

      // Apply scenario with ceiling rule
      const apply = (key) => {
        if (sc[key] == null) return p[key]; // pessimiste keeps prospect rates
        return Math.max(p[key] || 0, sc[key]);
      };

      const rates = {
        leadTraite: apply('leadTraite'),
        leadRdv: apply('leadRdv'),
        rdvHonore: apply('rdvHonore'),
        devisSignature: apply('devisSignature'),
      };

      const todaySigs = leadsRecus * p.leadTraite * p.leadRdv * p.rdvHonore * p.devisSignature;
      const systemSigs = leadsRecus * rates.leadTraite * rates.leadRdv * rates.rdvHonore * rates.devisSignature;
      const monthlyGain = (systemSigs - todaySigs) * ticket;
      const annualGain = monthlyGain * 12;
      const oneShot = devisDormants * sc.devisDormants * 0.33 * ticket;
      const total12mo = annualGain + oneShot;
      const roiMultiplier = Math.round(total12mo / INVESTMENT);
      const breakEvenMonth = oneShot >= INVESTMENT
        ? 1
        : (monthlyGain > 0 ? Math.ceil((INVESTMENT - oneShot) / monthlyGain) : null);

      const caActuel = todaySigs * ticket;
      const caPotentielMensuel = systemSigs * ticket;

      return { monthlyGain, annualGain, oneShot, total12mo, roiMultiplier, breakEvenMonth, caActuel, caPotentielMensuel };
    };

    // ============================================================
    // ROUTER (HASH-BASED)
    // ============================================================

    const useHashRoute = () => {
      const [route, setRoute] = useState(() => parseHash(window.location.hash));
      useEffect(() => {
        const onHashChange = () => setRoute(parseHash(window.location.hash));
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);
      return route;
    };
    function parseHash(hash) {
      const clean = (hash || '#/').replace(/^#/, '');
      const parts = clean.split('/').filter(Boolean);
      if (parts.length === 0) return { name: 'home' };
      if (parts[0] === 'admin') return { name: 'admin' };
      if (parts[0] === 'session' && parts[1]) return { name: 'session', slug: parts[1] };
      return { name: 'home' };
    }
    const navigate = (path) => { window.location.hash = path; };

    // ============================================================
    // CONTEXT
    // ============================================================

    const AppContext = createContext(null);

    const AppProvider = ({ children }) => {
      const [state, setState] = useState(loadState);
      const [apiKey, setApiKey] = useState(() => {
        // Migration douce depuis l'ancien stockage Anthropic
        const newKey = localStorage.getItem('scalia-gemini-key');
        if (newKey) return newKey;
        const oldKey = localStorage.getItem('scalia-anthropic-key');
        if (oldKey) { localStorage.removeItem('scalia-anthropic-key'); }
        return '';
      });
      const saveTimer = useRef(null);
      useEffect(() => {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => saveState(state), 400);
      }, [state]);
      useEffect(() => {
        if (apiKey) localStorage.setItem('scalia-gemini-key', apiKey);
        else localStorage.removeItem('scalia-gemini-key');
      }, [apiKey]);

      const createSession = (data) => {
        const baseSlug = slugify(data.companyName);
        const ds = dateSlug(data.meetingDate);
        const slug = `${baseSlug}-${ds}`;
        const session = {
          slug,
          dirigeantName: data.dirigeantName,
          companyName: data.companyName,
          clientWebsite: data.clientWebsite || '',
          clientLogoUrl: data.clientLogoUrl || '',
          clientScreenshot: data.clientScreenshot || '',
          // Méta extraites
          clientTagline: data.clientTagline || '',
          clientSecteur: data.clientSecteur || '',
          clientTonalite: data.clientTonalite || '',
          clientCtaTexte: data.clientCtaTexte || '',
          clientMotsClesMetier: data.clientMotsClesMetier || [],
          // Couleurs
          clientPrimaryColor: data.clientPrimaryColor || '#1E5F8E',
          clientSecondaryColor: data.clientSecondaryColor || '#888888',
          clientAccentColor: data.clientAccentColor || '',
          clientBgColor: data.clientBgColor || '#FAFAFA',
          clientBgAltColor: data.clientBgAltColor || '#FFFFFF',
          clientTextColor: data.clientTextColor || '#1A1A1A',
          clientMutedTextColor: data.clientMutedTextColor || '#666666',
          clientSuccessColor: data.clientSuccessColor || '#3A8A3A',
          clientDangerColor: data.clientDangerColor || '#B91C1C',
          clientBorderColor: data.clientBorderColor || '',
          // Typographie
          clientPrimaryFont: data.clientPrimaryFont || 'Inter',
          clientSecondaryFont: data.clientSecondaryFont || '',
          clientTitleScale: data.clientTitleScale || 'normal',
          // Styles
          clientBorderRadius: data.clientBorderRadius || '4px',
          clientCardStyle: data.clientCardStyle || 'flat',
          clientButtonStyle: data.clientButtonStyle || 'filled',
          clientShadowStyle: data.clientShadowStyle || 'soft',
          clientSeparatorStyle: data.clientSeparatorStyle || 'thin',
          clientInputStyle: data.clientInputStyle || 'bordered',
          clientIconStyle: data.clientIconStyle || 'minimal',
          clientSpacing: data.clientSpacing || 'balanced',
          clientTitleCase: data.clientTitleCase || 'none',
          clientTitleWeight: data.clientTitleWeight || '700',
          clientTitleLetterSpacing: data.clientTitleLetterSpacing || 'normal',
          clientLabelLetterSpacing: data.clientLabelLetterSpacing || 'wide',
          clientBandeauStyle: data.clientBandeauStyle || 'flat',
          clientBandeauGradient: data.clientBandeauGradient || '',
          clientHoverEffect: data.clientHoverEffect || 'color',
          clientDecorative: data.clientDecorative || 'none',
          clientStyleGeneral: data.clientStyleGeneral || '',
          clientAmbiance: data.clientAmbiance || '',
          meetingDate: data.meetingDate,
          inputs: { leadsRecus: '', leadsTraites: '', rdvPris: '', rdvHonores: '', signatures: '', ticket: '', devisDormants: '' },
          marketRatesOverrides: {},
          causes: { ...DEFAULT_CAUSES },
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
        };
        setState(s => ({ ...s, sessions: [...s.sessions, session] }));
        return slug;
      };
      const updateSession = (slug, patch) => {
        setState(s => ({
          ...s,
          sessions: s.sessions.map(ss => ss.slug === slug
            ? { ...ss, ...patch, updatedAt: new Date().toISOString() }
            : ss),
        }));
      };
      const deleteSession = (slug) => {
        if (!confirm('Supprimer cette session définitivement ?')) return;
        setState(s => ({ ...s, sessions: s.sessions.filter(ss => ss.slug !== slug) }));
      };
      const getSession = (slug) => state.sessions.find(s => s.slug === slug);
      const exportAll = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `scalia-roi-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };
      const importAll = (jsonText) => {
        try {
          const data = JSON.parse(jsonText);
          if (!data.sessions || !Array.isArray(data.sessions)) throw new Error();
          if (!confirm(`Importer ${data.sessions.length} session(s) ? Cela écrasera vos données actuelles.`)) return;
          setState(data);
          return true;
        } catch { alert('Fichier JSON invalide.'); return false; }
      };

      return (
        <AppContext.Provider value={{ state, apiKey, setApiKey, createSession, updateSession, deleteSession, getSession, exportAll, importAll }}>
          {children}
        </AppContext.Provider>
      );
    };
    const useApp = () => useContext(AppContext);

    // ============================================================
    // COMPONENTS — ADMIN
    // ============================================================

    const PasswordGate = ({ onUnlock }) => {
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState(false);
      const submit = (e) => {
        e.preventDefault();
        if (pwd === ADMIN_PASSWORD) onUnlock();
        else { setErr(true); setPwd(''); }
      };
      return (
        <div className="min-h-screen flex items-center justify-center bg-noir text-white">
          <form onSubmit={submit} className="w-full max-w-sm p-8 border border-or/30 rounded">
            <div className="logo-scalia mx-auto mb-8" style={{fontSize:'40px'}}>
              <span className="scalia">SCALIA</span>
              <span className="rule"></span>
              <span className="btp">BTP</span>
            </div>

    };

    const AdminPage = () => {
      // L'accès est déjà gated par le script auth en <head>
      return <AdminDashboard />;
    };

    const AdminDashboard = () => {
      const { state, apiKey, setApiKey, createSession, deleteSession, exportAll, importAll } = useApp();
      const [showForm, setShowForm] = useState(false);
      const [showApiSettings, setShowApiSettings] = useState(false);
      const [keyDraft, setKeyDraft] = useState(apiKey);

      return (
        <div className="min-h-screen bg-noir text-white">
          <div className="max-w-5xl mx-auto px-8 py-12">
            <div className="flex items-center justify-between mb-12">
              <div className="logo-scalia" style={{fontSize:'48px'}}>
                <span className="scalia">SCALIA</span>
                <span className="rule"></span>
                <span className="btp">BTP</span>
              </div>
              <div className="text-right">
                <p className="font-serif uppercase tracking-[0.25em] text-or text-xs">Calculateur ROI</p>
                <p className="text-gray-400 text-sm mt-1">Console admin</p>
              </div>
            </div>

            <div className="flex justify-between items-center mb-6">
              <h2 className="font-serif uppercase tracking-[0.18em] text-white text-lg">Sessions</h2>
              <button onClick={() => setShowForm(s => !s)} className="bg-or text-noir px-5 py-2.5 rounded font-semibold uppercase text-xs tracking-wider hover:bg-or-fonce transition">
                {showForm ? 'Annuler' : '+ Nouvelle session'}
              </button>
            </div>

            {showForm && <SessionForm onCreate={(data) => { const slug = createSession(data); setShowForm(false); navigate(`/session/${slug}`); }} onCancel={() => setShowForm(false)} />}

            <div className="mt-16 pt-8 border-t border-anthracite">

              <p className="text-gray-400 text-sm mb-3">
                {apiKey
                  ? <>✓ Clé configurée ({apiKey.slice(0,10)}…{apiKey.slice(-4)}). L'analyse IA est disponible quand tu uploades des captures.</>
                  : <>Non configurée. L'extraction se fait uniquement par couleurs dominantes (Phase A). Configure une clé <strong>Google Gemini</strong> pour activer l'analyse IA complète (couleurs + polices + style + ambiance) — <strong>100% gratuit, aucune carte bancaire</strong>.</>
                }
              </p>
              {showApiSettings ? (
                <div className="bg-noir-card border border-anthracite rounded p-4 space-y-3">
                  <input
                    type="password"
                    value={keyDraft}
                    onChange={e => setKeyDraft(e.target.value)}
                    placeholder="AIzaSy…"
                    className="form-input font-mono text-sm"
                    autoFocus
                  />
                  <div className="flex gap-2">
                    <button onClick={() => { setApiKey(keyDraft.trim()); setShowApiSettings(false); }} className="bg-or text-noir px-4 py-1.5 rounded text-xs font-semibold uppercase tracking-wider hover:bg-or-fonce transition">Enregistrer</button>
                    <button onClick={() => { setShowApiSettings(false); setKeyDraft(apiKey); }} className="text-gray-400 px-3 py-1.5 text-xs hover:text-white">Annuler</button>
                    {apiKey && <button onClick={() => { setApiKey(''); setKeyDraft(''); setShowApiSettings(false); }} className="text-rouge px-3 py-1.5 text-xs hover:text-white ml-auto">Effacer la clé</button>}
                  </div>
                  <div className="text-xs text-gray-400 leading-relaxed space-y-1">
                    <p><strong className="text-or">Setup gratuit, 2 minutes :</strong></p>
                    <p>1. Va sur <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-or underline">aistudio.google.com/app/apikey</a> <strong className="text-or">(IMPORTANT : aistudio.google.com, PAS Google Cloud Console)</strong></p>
                    <p>2. Connecte-toi avec un compte Google personnel (Gmail)</p>
                    <p>3. Clique <strong>"Create API key"</strong> → choisis "Create API key in new project" → copie la clé</p>
                    <p>4. Colle-la ici → Enregistrer</p>
                    <p className="mt-2 text-rouge"><strong>Si tu as l'erreur "quota limit:0"</strong> : ta clé vient de Google Cloud Console (mauvais setup). Recrée-la depuis aistudio.google.com avec un compte Google personnel — le free-tier sera automatique.</p>
                    <p className="mt-2 text-gray-500">Quota gratuit : 1 500 analyses/jour. L'app teste automatiquement gemini-2.5-flash, gemini-2.0-flash, puis gemini-1.5-flash en fallback. Clé stockée uniquement dans ce navigateur.</p>
                  </div>
                </div>
              ) : (
                <button onClick={() => setShowApiSettings(true)} className="bg-noir-card border border-or/40 text-or px-4 py-2 rounded text-sm hover:border-or transition">
                  {apiKey ? 'Modifier la clé' : '+ Configurer la clé API Gemini (gratuit)'}
                </button>
              )}
            </div>

            <div className="mt-12 pt-8 border-t border-anthracite">
              <h3 className="font-serif uppercase tracking-[0.18em] text-or text-sm mb-4">Sauvegarde</h3>
              <p className="text-gray-400 text-sm mb-4">
                Les sessions sont stockées dans ce navigateur (localStorage). Exportez régulièrement le JSON pour ne rien perdre lors d'un changement de PC.
              </p>
              <div className="flex gap-3">
                <button onClick={exportAll} className="bg-noir-card border border-or/40 text-or px-4 py-2 rounded text-sm hover:border-or transition">
                  ↓ Exporter toutes les sessions (JSON)
                </button>
                <label className="bg-noir-card border border-anthracite text-gray-300 px-4 py-2 rounded text-sm hover:border-or/40 cursor-pointer transition">
                  ↑ Importer un JSON
                  <input type="file" accept="application/json" className="hidden" onChange={e => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => importAll(ev.target.result);
                    reader.readAsText(file);
                    e.target.value = '';
                  }} />
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // Mappe la réponse AI (clés FR) vers le schema session (clés EN clientXxx)
    const mapAITokensToSession = (ai) => {
      if (!ai) return {};
      const patch = {};
      // Métadonnées
      if (ai.nomEntreprise) patch.companyName = ai.nomEntreprise;
      if (ai.tagline) patch.clientTagline = ai.tagline;
      if (ai.secteur) patch.clientSecteur = ai.secteur;
      if (ai.tonalite) patch.clientTonalite = ai.tonalite;
      if (ai.ctaTexte) patch.clientCtaTexte = ai.ctaTexte;
      if (Array.isArray(ai.motsClesMetier)) patch.clientMotsClesMetier = ai.motsClesMetier;
      // Couleurs
      if (ai.couleurPrimaire) patch.clientPrimaryColor = ai.couleurPrimaire;
      if (ai.couleurSecondaire) patch.clientSecondaryColor = ai.couleurSecondaire;
      if (ai.couleurAccent) patch.clientAccentColor = ai.couleurAccent;
      if (ai.couleurFond) patch.clientBgColor = ai.couleurFond;
      if (ai.couleurFondAlt) patch.clientBgAltColor = ai.couleurFondAlt;
      if (ai.couleurTexte) patch.clientTextColor = ai.couleurTexte;
      if (ai.couleurTexteSubtil) patch.clientMutedTextColor = ai.couleurTexteSubtil;
      if (ai.couleurSucces) patch.clientSuccessColor = ai.couleurSucces;
      if (ai.couleurDanger) patch.clientDangerColor = ai.couleurDanger;
      if (ai.couleurBordure) patch.clientBorderColor = ai.couleurBordure;
      // Typographie
      if (ai.policePrimaire) patch.clientPrimaryFont = ai.policePrimaire;
      if (ai.policeSecondaire) patch.clientSecondaryFont = ai.policeSecondaire;
      if (ai.echelleTitres) patch.clientTitleScale = ai.echelleTitres;
      // Styles
      if (ai.borderRadius) patch.clientBorderRadius = ai.borderRadius;
      if (ai.styleCartes) patch.clientCardStyle = ai.styleCartes;
      if (ai.styleBoutons) patch.clientButtonStyle = ai.styleBoutons;
      if (ai.styleOmbre) patch.clientShadowStyle = ai.styleOmbre;
      if (ai.styleSeparateur) patch.clientSeparatorStyle = ai.styleSeparateur;
      if (ai.styleInputs) patch.clientInputStyle = ai.styleInputs;
      if (ai.styleIcones) patch.clientIconStyle = ai.styleIcones;
      if (ai.espacement) patch.clientSpacing = ai.espacement;
      if (ai.casseTitres) patch.clientTitleCase = ai.casseTitres;
      if (ai.graisseTitres) patch.clientTitleWeight = ai.graisseTitres;
      if (ai.letterSpacingTitres) patch.clientTitleLetterSpacing = ai.letterSpacingTitres;
      if (ai.letterSpacingLabels) patch.clientLabelLetterSpacing = ai.letterSpacingLabels;
      if (ai.bandeauStyle) patch.clientBandeauStyle = ai.bandeauStyle;
      if (ai.bandeauGradient) patch.clientBandeauGradient = ai.bandeauGradient;
      if (ai.hoverEffect) patch.clientHoverEffect = ai.hoverEffect;
      if (ai.presenceDecorative) patch.clientDecorative = ai.presenceDecorative;
      if (ai.styleGeneral) patch.clientStyleGeneral = ai.styleGeneral;
      if (ai.ambiance) patch.clientAmbiance = ai.ambiance;
      return patch;
    };

    const SessionForm = ({ onCreate, onCancel }) => {
      const { apiKey } = useApp();
      // step: 'input' | 'fetching' | 'analyzing' | 'preview' | 'error'
      const [step, setStep] = useState('input');
      const [url, setUrl] = useState('');
      const [dirigeantName, setDirigeantName] = useState('');
      const [meetingDate, setMeetingDate] = useState(new Date().toISOString().slice(0, 10));
      const [showAdvanced, setShowAdvanced] = useState(false);
      const [overrideCompany, setOverrideCompany] = useState('');
      const [overrideLogo, setOverrideLogo] = useState('');
      const [screenshot, setScreenshot] = useState('');
      const [meta, setMeta] = useState(null);
      const [aiTokens, setAiTokens] = useState(null);
      const [error, setError] = useState('');

      const handleLogoUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const compressed = await compressImage(file);
          setOverrideLogo(compressed);
        } catch (err) {
          alert('Erreur compression : ' + err.message);
        }
      };

      const runFullPipeline = async () => {
        if (!url.trim()) { alert('Entre une URL d\'abord.'); return; }
        if (!apiKey) { alert('Configure d\'abord ta clé API Gemini en bas de cette page (gratuit, 2 minutes).'); return; }
        setError('');
        setStep('fetching');
        try {
          const result = await fetchUrlScreenshot(url);
          setScreenshot(result.screenshot);
          setMeta(result);
          // Précharger la police si disponible avant l'analyse
          setStep('analyzing');
          const tokens = await analyzeCharteAI(apiKey, [result.screenshot]);
          if (tokens.policePrimaire) loadGoogleFont(tokens.policePrimaire);
          if (tokens.policeSecondaire) loadGoogleFont(tokens.policeSecondaire);
          setAiTokens(tokens);
          setStep('preview');
        } catch (e) {
          setError(e.message || String(e));
          setStep('error');
        }
      };

      const confirmCreation = async () => {
        if (!dirigeantName.trim()) {
          alert('Entre au moins le nom du dirigeant pour personnaliser l\'accueil.');
          return;
        }
        const aiPatch = mapAITokensToSession(aiTokens);
        const companyName = (overrideCompany.trim() || aiPatch.companyName || meta?.title || domainNameFromUrl(url)).trim();
        if (!companyName) {
          alert('Impossible de déterminer le nom de l\'entreprise — entre-le manuellement (Avancé).');
          return;
        }
        const finalLogo = overrideLogo || meta?.logo || '';
        // Compresse le screenshot pour le stocker dans la session (utilisé comme
        // hero banner sur Mode Pertes — c'est CE qui fait l'identité visuelle).
        let storedScreenshot = '';
        if (screenshot) {
          try { storedScreenshot = await compressDataUrl(screenshot, 1000, 0.72); }
          catch { storedScreenshot = ''; }
        }
        onCreate({
          dirigeantName: dirigeantName.trim(),
          meetingDate,
          clientWebsite: url.trim(),
          clientLogoUrl: finalLogo,
          clientScreenshot: storedScreenshot,
          ...aiPatch,
          companyName,
        });
      };

      const resetAndRetry = () => {
        setStep('input');
        setError('');
        setScreenshot('');
        setMeta(null);
        setAiTokens(null);
      };

      return (
        <div className="bg-noir-card border border-anthracite rounded-lg p-8 mb-8 fade-in">
          {step === 'input' && (
            <FormStepInput
              url={url} setUrl={setUrl}
              dirigeantName={dirigeantName} setDirigeantName={setDirigeantName}
              meetingDate={meetingDate} setMeetingDate={setMeetingDate}
              showAdvanced={showAdvanced} setShowAdvanced={setShowAdvanced}
              overrideCompany={overrideCompany} setOverrideCompany={setOverrideCompany}
              overrideLogo={overrideLogo} handleLogoUpload={handleLogoUpload}
              apiKey={apiKey}
              onSubmit={runFullPipeline}
              onCancel={onCancel}
            />
          )}
          {(step === 'fetching' || step === 'analyzing') && (
            <FormStepProgress step={step} screenshot={screenshot} url={url} />
          )}
          {step === 'preview' && (
            <FormStepPreview
              screenshot={screenshot}
              meta={meta}
              aiTokens={aiTokens}
              url={url}
              dirigeantName={dirigeantName} setDirigeantName={setDirigeantName}
              meetingDate={meetingDate} setMeetingDate={setMeetingDate}
              overrideCompany={overrideCompany} setOverrideCompany={setOverrideCompany}
              overrideLogo={overrideLogo} handleLogoUpload={handleLogoUpload}
              onConfirm={confirmCreation}
              onRetry={resetAndRetry}
              onCancel={onCancel}
            />
          )}
          {step === 'error' && (
            <div className="text-center py-8">
              <p className="text-rouge text-lg mb-3">⚠ Erreur</p>
              <p className="text-gray-300 mb-6 text-sm">{error}</p>
              <button onClick={resetAndRetry} className="bg-or text-noir px-5 py-2.5 rounded font-semibold uppercase text-xs tracking-wider hover:bg-or-fonce transition">
                Recommencer
              </button>
            </div>
          )}
        </div>
      );
    };

    // ===== ÉTAPE 1 : SAISIE URL =====
    const FormStepInput = ({ url, setUrl, dirigeantName, setDirigeantName, meetingDate, setMeetingDate, showAdvanced, setShowAdvanced, overrideCompany, setOverrideCompany, overrideLogo, handleLogoUpload, apiKey, onSubmit, onCancel }) => {
      const submit = (e) => { e.preventDefault(); onSubmit(); };
      return (
        <form onSubmit={submit}>
          <h3 className="font-serif uppercase tracking-[0.18em] text-or text-sm mb-2">Nouvelle session</h3>
          <p className="text-gray-400 text-sm mb-8">Colle l'URL du site prospect — l'IA extrait automatiquement la charte (couleurs, polices, style, ambiance, secteur, tagline) et personnalise entièrement la page d'audit.</p>

          <div className="mb-6">
            <label className="block text-xs uppercase tracking-wider text-or mb-2">URL du site prospect *</label>
            <input
              type="text"
              value={url}
              onChange={e => setUrl(e.target.value)}
              placeholder="ex: www.lapeyre.fr"
              className="form-input text-lg"
              autoFocus
              required
            />
          </div>

          <div className="mb-6 grid grid-cols-2 gap-4">
            <div>
              <label className="block text-xs uppercase tracking-wider text-or mb-2">Nom du dirigeant *</label>
              <input
                type="text"
                value={dirigeantName}
                onChange={e => setDirigeantName(e.target.value)}
                placeholder="ex: Pierre Martin"
                className="form-input"
                required
              />
            </div>
            <div>
              <label className="block text-xs uppercase tracking-wider text-or mb-2">Date du rendez-vous</label>
              <input
                type="date"
                value={meetingDate}
                onChange={e => setMeetingDate(e.target.value)}
                className="form-input"
              />
            </div>
          </div>

          <button type="button" onClick={() => setShowAdvanced(s => !s)} className="text-xs text-gray-500 hover:text-or mb-4 transition">
            {showAdvanced ? '− Masquer les options avancées' : '+ Options avancées (forcer nom entreprise ou logo)'}
          </button>

          {showAdvanced && (
            <div className="mb-6 p-4 bg-noir rounded border border-anthracite fade-in space-y-4">
              <div>
                <label className="block text-xs uppercase tracking-wider text-gray-400 mb-2">Forcer le nom de l'entreprise</label>
                <input
                  type="text"
                  value={overrideCompany}
                  onChange={e => setOverrideCompany(e.target.value)}
                  placeholder="Vide = utilise celui détecté par l'IA"
                  className="form-input"
                />
              </div>
              <div>
                <label className="block text-xs uppercase tracking-wider text-gray-400 mb-2">Forcer un logo (PNG/JPG/SVG)</label>
                <input type="file" accept="image/*" onChange={handleLogoUpload} className="form-input" />
                {overrideLogo && <img src={overrideLogo} alt="" className="mt-2 max-h-12 bg-white p-1 rounded" />}
                <p className="text-[11px] text-gray-500 mt-1">Vide = utilise le logo extrait automatiquement du site.</p>
              </div>
            </div>
          )}

          {!apiKey && (
            <div className="mb-6 p-3 bg-rouge/10 border border-rouge/30 rounded text-sm text-rouge">
              ⚠ Clé API Gemini non configurée. Configure-la d'abord en bas de la page (gratuit, 2 minutes).
            </div>
          )}

          <div className="flex gap-3 justify-end">
            <button type="button" onClick={onCancel} className="px-5 py-2.5 text-gray-400 hover:text-white transition text-sm">Annuler</button>
            <button type="submit" disabled={!apiKey || !url.trim() || !dirigeantName.trim()} className="bg-or text-noir px-7 py-3 rounded font-bold uppercase text-sm tracking-wider hover:bg-or-fonce transition disabled:opacity-30 disabled:cursor-not-allowed">
              ✦ Générer la session
            </button>
          </div>
        </form>
      );
    };

    // ===== ÉTAPE 2 : PROGRESSION =====
    const FormStepProgress = ({ step, screenshot, url }) => {
      const messages = {
        fetching: { title: 'Récupération du site…', sub: 'Capture d\'écran via Microlink en cours.' },
        analyzing: { title: 'Analyse de la charte par IA…', sub: 'Gemini extrait les couleurs, polices, style général, ambiance.' },
      };
      const m = messages[step];
      return (
        <div className="text-center py-12">
          <div className="inline-flex flex-col items-center">
            <div className="mb-6 relative">
              {screenshot
                ? <img src={screenshot} alt="" className="max-w-md max-h-64 rounded border border-or/30 opacity-80" />
                : <div className="w-72 h-48 rounded border border-anthracite bg-noir flex items-center justify-center text-gray-500 text-sm">{url || 'www.…'}</div>
              }
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="bg-noir/60 backdrop-blur px-4 py-2 rounded">
                  <div className="flex items-center gap-2 text-or text-sm">
                    <span className="inline-block w-2 h-2 rounded-full bg-or animate-pulse" />
                    <span className="font-serif uppercase tracking-wider text-xs">{step === 'fetching' ? 'Capture…' : 'IA…'}</span>
                  </div>
                </div>
              </div>
            </div>
            <p className="text-or font-serif uppercase tracking-[0.18em] text-sm mb-2">{m.title}</p>
            <p className="text-gray-400 text-sm">{m.sub}</p>
          </div>
        </div>
      );
    };

    // ===== ÉTAPE 3 : APERÇU DES TOKENS DÉTECTÉS =====
    const FormStepPreview = ({ screenshot, meta, aiTokens, url, dirigeantName, setDirigeantName, meetingDate, setMeetingDate, overrideCompany, setOverrideCompany, overrideLogo, handleLogoUpload, onConfirm, onRetry, onCancel }) => {
      const t = aiTokens || {};
      const detectedLogo = overrideLogo || meta?.logo || '';
      const detectedName = overrideCompany || t.nomEntreprise || meta?.title || domainNameFromUrl(url);
      const swatches = [t.couleurPrimaire, t.couleurSecondaire, t.couleurAccent, t.couleurFond, t.couleurFondAlt, t.couleurTexte, t.couleurSucces, t.couleurDanger].filter(Boolean);
      return (
        <div className="fade-in">
          <div className="flex items-start justify-between mb-6">
            <div>
              <h3 className="font-serif uppercase tracking-[0.18em] text-or text-sm mb-1">✓ Charte extraite</h3>
              <p className="text-gray-400 text-sm">Vérifie le résultat et lance la session — tu pourras saisir les chiffres ensuite.</p>
            </div>
            <button onClick={onRetry} className="text-xs text-gray-500 hover:text-or transition">↻ Recommencer</button>
          </div>

          {/* Aperçu visuel : screenshot + nom détecté */}
          <div className="grid grid-cols-2 gap-6 mb-6">
            <div>
              {screenshot && <img src={screenshot} alt="" className="rounded border border-anthracite w-full" />}
              <p className="text-[11px] text-gray-500 mt-1 font-mono truncate">{url}</p>
            </div>
            <div className="space-y-4">
              <div>
                <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Entreprise détectée</p>
                <p className="text-white text-xl font-semibold" style={{ fontFamily: t.policePrimaire ? `'${t.policePrimaire}', sans-serif` : 'inherit' }}>{detectedName}</p>
                {t.tagline && <p className="text-gray-400 text-sm italic mt-1">"{t.tagline}"</p>}
                {detectedLogo && <img src={detectedLogo} alt="" className="mt-2 max-h-10 bg-white/5 p-1 rounded" />}
              </div>
              {(t.secteur || t.tonalite) && (
                <div className="flex gap-2 flex-wrap">
                  {t.secteur && <span className="px-2 py-1 bg-noir border border-or/40 rounded text-[11px] text-or uppercase tracking-wider">{t.secteur}</span>}
                  {t.tonalite && <span className="px-2 py-1 bg-noir border border-anthracite rounded text-[11px] text-gray-300 uppercase tracking-wider">{t.tonalite}</span>}
                </div>
              )}
              {t.styleGeneral && (
                <div>
                  <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Style</p>
                  <p className="text-gray-200 text-sm">{t.styleGeneral}</p>
                </div>
              )}
              {t.ambiance && (
                <div>
                  <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Ambiance</p>
                  <p className="text-gray-300 text-sm italic">{t.ambiance}</p>
                </div>
              )}
            </div>
          </div>

          {/* Couleurs détectées */}
          {swatches.length > 0 && (
            <div className="mb-6 p-4 bg-noir rounded border border-anthracite">
              <p className="text-[10px] uppercase tracking-wider text-gray-500 mb-3">Palette extraite</p>
              <div className="flex gap-3 flex-wrap">
                {swatches.map((c, i) => (
                  <div key={i} className="flex flex-col items-center gap-1">
                    <div className="w-12 h-12 rounded border border-white/10" style={{ background: c }} />
                    <span className="text-[10px] text-gray-400 font-mono">{c}</span>
                  </div>
                ))}
              </div>
            </div>

    const compressDataUrl = (dataUrl, maxWidth = 1000, quality = 0.75) => new Promise((resolve, reject) => {

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(1, maxWidth / img.width);
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = dataUrl;
    });

        reader.readAsDataURL(file);
        return;

      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => {
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxW = 600;
          const ratio = Math.min(1, maxW / img.width);
          canvas.width = img.width * ratio;
          canvas.height = img.height * ratio;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        };
        img.onerror = reject;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);

    const fetchUrlScreenshot = async (url) => {

      if (!/^https?:\/\//i.test(target)) target = 'https://' + target;

      const params = new URLSearchParams({
        url: target,
        screenshot: 'true',
        meta: 'false',
        'viewport.width': '1280',
        'viewport.height': '900',
        'viewport.deviceScaleFactor': '1',
        waitUntil: 'load',
        'screenshot.type': 'png',
      });
      const apiUrl = `https://api.microlink.io/?${params.toString()}`;

      const response = await fetch(apiUrl);
      if (!response.ok) {
        let detail = '';
        try {
          const errBody = await response.json();
          detail = ' — ' + (errBody?.message || errBody?.data?.message || JSON.stringify(errBody).slice(0, 200));
        } catch {
          try { detail = ' — ' + (await response.text()).slice(0, 200); } catch {}
        }
        throw new Error(`Microlink HTTP ${response.status}${detail}`);
      }
      const data = await response.json();
      if (data.status !== 'success') throw new Error('Microlink : ' + (data.message || 'erreur inconnue'));
      const screenshotUrl = data?.data?.screenshot?.url;
      if (!screenshotUrl) throw new Error('Aucun screenshot retourné par Microlink.');

      const imgResp = await fetch(screenshotUrl);

        reader.readAsDataURL(blob);

        screenshot: dataUrl,
        title: data?.data?.title || '',
        description: data?.data?.description || '',
        logo: '',
        publisher: data?.data?.publisher || '',
        author: data?.data?.author || '',

      // Liste de modèles Gemini actuels (mi-2026). Les gemini-1.5-* ont été
      // dépréciés. On essaie chaque modèle, avec un retry après 2s sur
      // surcharge 5xx pour ne pas abandonner un bon modèle sur un pic temporaire.
      const MODELS_TO_TRY = [
        'gemini-2.5-flash',
        'gemini-2.5-flash-lite',
        'gemini-2.0-flash',
        'gemini-2.0-flash-lite',
        'gemini-flash-latest',
      ];
      const body = JSON.stringify({
        contents: [{ parts: [...imageParts, { text: prompt }] }],
        generationConfig: {
          response_mime_type: 'application/json',
          temperature: 0.15,
          max_output_tokens: 4096,
        },
      });

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));
      const tryModel = async (model) => {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
        try {
          const r = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
          if (r.ok) return { ok: true, response: r };
          const errText = await r.text();
          let errMsg = `HTTP ${r.status}`;
          try { errMsg = JSON.parse(errText).error?.message || errMsg; } catch {}
          return { ok: false, status: r.status, message: errMsg };
        } catch (netErr) {
          return { ok: false, status: 0, message: 'Réseau : ' + netErr.message };
        }
      };

      let lastError = null;
      let response = null;
      for (const model of MODELS_TO_TRY) {
        let attempt = await tryModel(model);
        // Retry une fois après 2s si surcharge transitoire 5xx
        if (!attempt.ok && (attempt.status >= 500 || /high demand|overload|unavailable|try again|experiencing|temporar/i.test(attempt.message))) {
          await sleep(2000);
          attempt = await tryModel(model);
        }
        if (attempt.ok) { response = attempt.response; lastError = null; break; }
        lastError = { status: attempt.status, message: attempt.message, model };
        // Passer au modèle suivant si quota:0, 429, 404, ou surcharge persistante 5xx.
        // Si 401/403 (clé invalide), inutile de continuer.
        const isQuota        = attempt.status === 429 || /limit:\s*0|quota|rate limit/i.test(attempt.message);
        const isModelMissing = attempt.status === 404 || /not found|not supported/i.test(attempt.message);
        const isOverload     = attempt.status >= 500 || /high demand|overload|unavailable|try again|experiencing|temporar/i.test(attempt.message);
        if (!isQuota && !isModelMissing && !isOverload) break;
      }

      if (lastError) {
        let hint = '';
        if (/limit:\s*0/i.test(lastError.message)) {
          hint = '\n\nCause probable : la clé API a été créée depuis Google Cloud Console au lieu de aistudio.google.com — le free-tier n\'est pas activé. Solution : recrée la clé sur https://aistudio.google.com/app/apikey (avec un compte Google personnel).';
        } else if (lastError.status === 401 || lastError.status === 403) {
          hint = '\n\nCause probable : clé API invalide ou expirée. Régénère-la sur https://aistudio.google.com/app/apikey';
        } else if (lastError.status === 429) {
          hint = '\n\nQuota du jour atteint sur tous les modèles testés. Réessaie demain ou utilise une autre clé.';
        } else if (lastError.status >= 500 || /high demand|overload|unavailable|try again|experiencing/i.test(lastError.message)) {
          hint = '\n\nTous les modèles Gemini sont en surcharge temporaire. Réessaie dans 30-60 secondes — c\'est un pic de demande côté Google, pas un problème de ta clé.';
        }
        throw new Error(`${lastError.message} (modèle: ${lastError.model})${hint}`);
      }

      if (!text) throw new Error('Réponse IA vide.');

      try {
        return JSON.parse(text);

        const match = text.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('Réponse IA invalide (pas de JSON détecté).');
        try { return JSON.parse(match[0]); }
        catch { throw new Error('JSON IA mal formé.'); }
      }
